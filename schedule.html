  // ── Week Import/Export (CSV/Excel) — matches only by staff name + day-by-day shift; ──
  // ── the file's layout doesn't need to match this tool's own layout in either direction. ──
  const SHIFT_CODE_ALIASES = {
    '': 'OFF', 'off': 'OFF', 'o': 'OFF', 'rest': 'OFF', 'offday': 'OFF',
    'off(r)': 'OFFDAYR', 'off (r)': 'OFFDAYR', 'offr': 'OFFDAYR', 'offdayr': 'OFFDAYR', 'offday(r)': 'OFFDAYR', 'offday (r)': 'OFFDAYR', 'requested off': 'OFFDAYR', 'off req': 'OFFDAYR', 'offreq': 'OFFDAYR', 'off fix': 'OFFDAYR',
    'al': 'AL', 'annual leave': 'AL', 'annual': 'AL',
    'bl': 'BL', 'birthday leave': 'BL', 'birthday': 'BL',
    'mc': 'MC', 'medical': 'MC', 'medical certificate': 'MC', 'sick': 'MC', 'sick leave': 'MC',
    'm': 'M', 'morning': 'M', 'am': 'M',
    'c': 'C', 'closing': 'C', 'pm': 'C', 'close': 'C',
    'mid': 'MID', 'midshift': 'MID', 'mid-shift': 'MID', 'middle': 'MID',
    'custom': 'CUSTOM', 'cus': 'CUSTOM',
    'cover': 'COVER', 'cov': 'COVER'
  };
  function normName(s){ return String(s==null?'':s).trim().toLowerCase().replace(/\s+/g,' '); }
  function matchStaffByName(rawName){
    const target = normName(rawName);
    if(!target) return null;
    let hit = roster.find(s => normName(s.name) === target);
    if(hit) return hit;
    hit = roster.find(s => normName(s.name).includes(target) || target.includes(normName(s.name)));
    return hit || null;
  }
  // Reads a shift cell — a known code/alias (matched whole, or as a leading word before a
  // parenthetical note like "M (CHAI LENG)"), or a raw time range, which becomes a CUSTOM
  // shift with parsed start/end times. Handles both "7.00PM-10.30PM" and "0830AM-0200PM".
  const TIME_RANGE_SEP_RE = /(\d{1,2})[.:](\d{2})\s*([AaPp]\.?[Mm]\.?)\s*[-\u2013]\s*(\d{1,2})[.:](\d{2})\s*([AaPp]\.?[Mm]\.?)/;
  const TIME_RANGE_COMPACT_RE = /(\d{1,2})(\d{2})\s*([AaPp]\.?[Mm]\.?)\s*[-\u2013]\s*(\d{1,2})(\d{2})\s*([AaPp]\.?[Mm]\.?)/;
  function to24h(hh, mm, ampm){
    let h = parseInt(hh, 10);
    if(/p/i.test(ampm) && h !== 12) h += 12;
    if(/a/i.test(ampm) && h === 12) h = 0;
    return { HH: String(h).padStart(2,'0'), MM: mm };
  }
  function parseShiftCell(raw){
    const text = String(raw==null?'':raw).trim();
    const key = text.toLowerCase();
    if(SHIFT_CODE_ALIASES.hasOwnProperty(key)) return { code: SHIFT_CODE_ALIASES[key] };
    const lead = text.match(/^([A-Za-z]+)\b/);
    if(lead && SHIFT_CODE_ALIASES.hasOwnProperty(lead[1].toLowerCase())){
      return { code: SHIFT_CODE_ALIASES[lead[1].toLowerCase()] };
    }
    const m = text.match(TIME_RANGE_SEP_RE) || text.match(TIME_RANGE_COMPACT_RE);
    if(m){
      const start = to24h(m[1], m[2], m[3]);
      const end = to24h(m[4], m[5], m[6]);
      return { code: 'CUSTOM', csHH: start.HH, csMM: start.MM, ceHH: end.HH, ceMM: end.MM };
    }
    return { code: 'OFF', unrecognized: text || null };
  }
  // Reads the uploaded file and returns { sheets: [{ name, rows2D }] } — every sheet for
  // Excel files (real rosters are often not on the first tab), one pseudo-sheet for CSV.
  function readFileAsSheets(file, cb){
    const isExcel = /\.xlsx$|\.xls$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        if(isExcel && window.XLSX){
          const wb = XLSX.read(evt.target.result, { type: 'array' });
          const sheets = wb.SheetNames.map(name => ({
            name,
            rows2D: XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' })
          }));
          cb(sheets);
        } else {
          const text = typeof evt.target.result === 'string' ? evt.target.result : new TextDecoder().decode(evt.target.result);
          const rows = text.split(/\r?\n/).filter(l=>l.trim().length).map(line=>{
            const cells = [];
            let cur = '', inQ = false;
            for(let i=0;i<line.length;i++){
              const ch = line[i];
              if(ch === '"'){ inQ = !inQ; continue; }
              if(ch === ',' && !inQ){ cells.push(cur); cur=''; continue; }
              cur += ch;
            }
            cells.push(cur);
            return cells;
          });
          cb([{ name: file.name, rows2D: rows }]);
        }
      } catch(err){ alert('Could not read that file: ' + err.message); }
    };
    if(isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file);
  }
  // Finds every row that lists Mon..Sun (in any order/spelling) — real weekly rosters often
  // stack several weeks in one sheet, so we need every header, not just one, to know where
  // each week block starts and ends.
  function findWeekdayHeaderRows(rows2D){
    const dayPatterns = [/^mon/i, /^tue/i, /^wed/i, /^thu/i, /^fri/i, /^sat/i, /^sun/i];
    const found = [];
    for(let r = 0; r < rows2D.length; r++){
      const row = rows2D[r] || [];
      const cols = dayPatterns.map(pat => row.findIndex(c => pat.test(String(c).trim())));
      const foundCount = cols.filter(i => i !== -1).length;
      if(foundCount >= 5) found.push({ rowIdx: r, cols, foundCount });
    }
    return found;
  }
  // The staff-name column isn't always directly left of the day columns (real sheets have
  // note/task columns wedged in), so pick whichever column left of the days is most
  // consistently filled with non-numeric text across the rows in this week's block.
  function detectNameColumn(rows2D, headerRowIdx, boundaryIdx, dayCols){
    const validDayCols = dayCols.filter(c => c !== -1);
    const minDayCol = validDayCols.length ? Math.min(...validDayCols) : 1;
    let bestCol = Math.max(0, minDayCol - 1), bestScore = -1;
    for(let c = 0; c < minDayCol; c++){
      let score = 0;
      for(let r = headerRowIdx+1; r < boundaryIdx; r++){
        const v = rows2D[r] && rows2D[r][c];
        const s = v==null ? '' : String(v).trim();
        if(s && !/^-?\d+(\.\d+)?$/.test(s)) score++;
      }
      if(score > bestScore){ bestScore = score; bestCol = c; }
    }
    return bestCol;
  }
  // Row labels that are summary/meta rows, not staff — real rosters have plenty of these
  // (date rows, task rows, headcount rows, section dividers like "PART TIME").
  const NON_STAFF_ROW_RE = /^(date|day|task|work ?task|ph\s*\/?\s*event|promotion|cash sales|target sales|sales achieved|actual sales|headcount|shift headcount|planned work hour|actual work hour|target productivity|actual productivity|outlet supervisor|outlet leader|full ?time|part ?time|cover staff|staff|management|finalize|total target)/i;
  // Turns one sheet's raw 2D rows into { rawName, shifts:[7 parsed cells] } entries for just
  // the FIRST week block found in that sheet — bounded by the next weekday-header row, so
  // multiple weeks stacked in one sheet don't get mixed together.
  // Looks a few rows around the weekday-header row for a row of small numbers (1-31) in
  // the same columns — that's the actual date-of-month row, if the file has one.
  function findDateRowValues(rows2D, headerIdx, dayCols){
    for(let r = Math.max(0, headerIdx-3); r <= headerIdx+1; r++){
      if(r === headerIdx) continue;
      const row = rows2D[r] || [];
      const vals = dayCols.map(ci => ci===-1 ? '' : String(row[ci]==null?'':row[ci]).trim());
      const numericCount = vals.filter(v => /^\d{1,2}(\.0+)?$/.test(v)).length;
      if(numericCount >= 5) return vals.map(v => v ? String(Math.round(parseFloat(v))) : '?');
    }
    return null;
  }
  // Looks a few rows above the day-header row for a title like "JULY 2026 (WEEK 3)" —
  // this tool's own exports embed exactly that, so re-imported files can show the real
  // week number instead of making the person count dates themselves.
  function findWeekTitleLabel(rows2D, headerIdx){
    for(let r = Math.max(0, headerIdx-4); r < headerIdx; r++){
      const row = rows2D[r] || [];
      for(const cell of row){
        const text = String(cell==null?'':cell).trim();
        if(/\bweek\s*\d+\b/i.test(text)) return text;
      }
    }
    return null;
  }
  // Extracts one week block given its position among the headers found in this sheet.
  const SECTION_ROLE_PATTERNS = [
    { re: /^outlet supervisor/i, role: 'OS' },
    { re: /^outlet leader/i, role: 'OS' },
    { re: /^full ?time/i, role: 'FT' },
    { re: /^cover staff/i, role: 'CS' },
    { re: /^part ?time/i, role: 'PT' }
  ];
  function detectSectionRole(name){
    const hit = SECTION_ROLE_PATTERNS.find(p => p.re.test(name));
    return hit ? hit.role : null;
  }
  function extractRowsForHeader(rows2D, headers, headerPos){
    const { rowIdx: headerIdx, cols: dayCols } = headers[headerPos];
    const boundaryIdx = headers.length > headerPos+1 ? headers[headerPos+1].rowIdx : rows2D.length;
    const nameCol = detectNameColumn(rows2D, headerIdx, boundaryIdx, dayCols);
    const dayTokens = dayCols.filter(c=>c!==-1).map(c => String(rows2D[headerIdx][c]).trim());
    const weekLabel = dayTokens.join(', ');
    const dateVals = findDateRowValues(rows2D, headerIdx, dayCols);
    const dateLabel = dateVals ? dayTokens.map((d,i)=>d.slice(0,3).toUpperCase()+' '+dateVals[i]).join(', ') : null;
    const titleLabel = findWeekTitleLabel(rows2D, headerIdx);
    const out = [];
    let currentSectionRole = null; // updates as we pass each "OUTLET SUPERVISOR"/"FULLTIME"/etc section row
    for(let r = headerIdx+1; r < boundaryIdx; r++){
      const row = rows2D[r] || [];
      const name = String(row[nameCol]==null?'':row[nameCol]).trim();
      if(!name) continue;
      const sectionRole = detectSectionRole(name);
      if(sectionRole){ currentSectionRole = sectionRole; continue; } // this row IS a section header, not a person
      if(NON_STAFF_ROW_RE.test(name)) continue;
      const dayVals = dayCols.map(ci => ci===-1 ? '' : String(row[ci]==null?'':row[ci]).trim());
      if(!dayVals.some(v=>v)) continue; // no schedule data on this row, skip
      out.push({ rawName: name, shifts: dayVals.map(v => parseShiftCell(v)), detectedRole: currentSectionRole });
    }
    return { rows: out, weekLabel, dateLabel, titleLabel };
  }
  function extractWeekRowsFromSheet(rows2D){
    const headers = findWeekdayHeaderRows(rows2D);
    if(!headers.length) return { rows: [], weekLabel: null, dateLabel: null, titleLabel: null };
    return extractRowsForHeader(rows2D, headers, 0);
  }
  function extractWeekRows(sheets){
    for(const sheet of sheets){
      const { rows, weekLabel, dateLabel, titleLabel } = extractWeekRowsFromSheet(sheet.rows2D);
      if(rows.length) return { rows, sheetName: sheet.name, weekLabel, dateLabel, titleLabel };
    }
    return { rows: [], sheetName: null, weekLabel: null, dateLabel: null, titleLabel: null };
  }
  // Finds every week block across every sheet — used when a file has more than one week
  // stacked, so the user can pick exactly which one to import instead of always getting
  // whichever happens to come first.
  function extractAllWeekBlocks(sheets){
    const blocks = [];
    sheets.forEach(sheet => {
      const headers = findWeekdayHeaderRows(sheet.rows2D);
      headers.forEach((h, i) => {
        const { rows, weekLabel, dateLabel, titleLabel } = extractRowsForHeader(sheet.rows2D, headers, i);
        if(rows.length) blocks.push({ sheetName: sheet.name, rows, weekLabel, dateLabel, titleLabel });
      });
    });
    return blocks;
  }
  function startWeekImportReview(parsedRows, weekLabel, dateLabel, titleLabel){
    const resolutions = parsedRows.map(pr => {
      const staff = matchStaffByName(pr.rawName);
      pr.autoMatchedStaffId = staff ? staff.id : null; // fixed at import time -- doesn't change even if the dropdown is later switched
      return staff ? staff.id : 'SKIP';
    });
    weekImportReview = { parsedRows, weekLabel, dateLabel, titleLabel, resolutions, forceShowAll: [] };
    render();
  }
  function applyWeekImport(entries){
    // entries: [{ staffId, shifts:[7 parsed cells: {code, csHH?, csMM?, ceHH?, ceMM?}] }]
    // This file represents the FULL week's schedule, so anyone currently in this week's
    // rows (e.g. inherited from a previous week when you switched here) but NOT present
    // in the imported file gets removed from this week's schedule -- they stay in your
    // roster, they just won't show as scheduled this particular week unless re-added.
    const importedStaffIds = new Set(entries.map(e => e.staffId));
    scheduleRows = scheduleRows.filter(r => importedStaffIds.has(r.staffId));
    let unrecognizedCount = 0;
    entries.forEach(({ staffId, shifts }) => {
      let row = scheduleRows.find(r => r.staffId === staffId);
      if(!row){ row = { id: uid('row'), staffId, shifts: [0,1,2,3,4,5,6].map(()=>blankShift()) }; scheduleRows.push(row); }
      row.shifts = shifts.map(cell => {
        const s = blankShift();
        s.type = cell.code;
        if(cell.unrecognized) unrecognizedCount++;
        if(cell.code==='MID') s.midStart = 600;
        if(cell.code==='CUSTOM'){
          s.csHH = cell.csHH || '09'; s.csMM = cell.csMM || '00';
          s.ceHH = cell.ceHH || '17'; s.ceMM = cell.ceMM || '30';
        }
        if(cell.code==='COVER') s.coverDirection = 'out';
        return s;
      });
    });
    weekImportReview = null;
    persistCurrent();
    render();
    alert('Week schedule imported for ' + entries.length + ' staff member(s) \u2014 this replaces the whole week, so anyone not in the file is no longer scheduled this week (they\'re still in your roster).' + (unrecognizedCount ? ' ' + unrecognizedCount + ' cell(s) had text this tool didn\'t recognize and were set to OFF \u2014 worth a quick check.' : ''));
  }
  function to12hLabel(HH, MM){
    let h = parseInt(HH, 10);
    const ampm = h >= 12 ? 'PM' : 'AM';
    let h12 = h % 12; if(h12 === 0) h12 = 12;
    return h12 + '.' + (MM || '00') + ampm;
  }
  function exportCellText(sh){
    if(sh.type === 'OFF') return 'OFFDAY';
    if(sh.type === 'OFFDAYR') return 'OFFDAY (R)';
    if(sh.type === 'CUSTOM'){
      return to12hLabel(sh.csHH || '09', sh.csMM || '00') + ' - ' + to12hLabel(sh.ceHH || '17', sh.ceMM || '30');
    }
    if(sh.type === 'COVER'){
      const times = to12hLabel(sh.csHH || '09', sh.csMM || '00') + ' - ' + to12hLabel(sh.ceHH || '17', sh.ceMM || '30');
      const dirLabel = sh.coverDirection === 'in' ? 'COVERING IN' : 'COVERING OUT';
      const note = (sh.coverNote || '').trim();
      return `${note ? '(' + note + ') ' : ''}${times} ${dirLabel}`;
    }
    return sh.type;
  }
  const XLSX_STYLE = {
    COLORS: {
      navy: 'FF1B3A6B', navyDark: 'FF0F2748', gold: 'FFD6AD55', cream: 'FFFBF7EE',
      blueBg: 'FFDCE7F7', purple: 'FFE3DBF5', teal: 'FF008080', red: 'FFC23B3B',
      alGreen: 'FFCDEEE6', white: 'FFFFFFFF', steelBlue: 'FF4682B4', deepSeaBlue: 'FF123456'
    },
    FONT_NAME: 'Spectral',
    thinBorder: {
      top: {style:'thin', color:{argb:'FFB0B0B0'}}, left: {style:'thin', color:{argb:'FFB0B0B0'}},
      bottom: {style:'thin', color:{argb:'FFB0B0B0'}}, right: {style:'thin', color:{argb:'FFB0B0B0'}}
    },
    centered: { horizontal: 'center', vertical: 'middle', wrapText: true }
  };
  const SECTION_ORDER = [
    { role: 'OS', label: 'OUTLET SUPERVISOR' },
    { role: 'FT', label: 'FULLTIME' },
    { role: 'CS', label: 'COVER STAFF' },
    { role: 'PT', label: 'PART TIME' }
  ];
  // Writes one week's table (title, DATE/DAY, TARGET/SALES/TASK, role sections, headcount)
  // into `ws` starting at row `startRow`. Returns the next free row after this block, so
  // multiple weeks can be stacked one after another in the same sheet.
  // Recurring short promo codes (shown as compact badges in the live tool) get expanded to
  // their full readable text in the export, so nothing is left cryptic on a printed sheet.
  const WEEKLY_NOTE_LABELS = { 'ZDB3F1': 'ZUSDAY BUY3FREE1' };
  function writeWeekBlock(ws, startRow, month, week, scheduleRowsForWeek, rosterForWeek, dailySalesForWeek, customDayNotesForWeek){
    const { COLORS, FONT_NAME, thinBorder, centered } = XLSX_STYLE;
    const font = (opts) => Object.assign({ name: FONT_NAME }, opts || {});
    const fill = argb => ({ type: 'pattern', pattern: 'solid', fgColor: { argb } });
    const lastCol = 9;
    const columns = getColumnsFor(month, week);
    const staffById = {};
    rosterForWeek.forEach(s => { staffById[s.id] = s; });
    const dayNotes = customDayNotesForWeek || ['','','','','','',''];
    let r = startRow;

    ws.mergeCells(r,2,r,lastCol);
    const titleCell = ws.getCell(r,2);
    titleCell.value = `${MONTH_NAMES[month-1].toUpperCase()} ${YEAR} (WEEK ${week})`;
    titleCell.font = font({ bold:true, color:{argb:COLORS.white}, size:12 });
    titleCell.fill = fill(COLORS.navyDark);
    titleCell.alignment = centered;
    r++;

    let row = ws.getRow(r);
    row.getCell(2).value = 'DATE';
    columns.forEach((c,i)=>{ row.getCell(3+i).value = c.dateNum; });
    for(let c=2;c<=lastCol;c++){ const cell=row.getCell(c); cell.fill=fill(COLORS.gold); cell.font=font({bold:true}); cell.alignment=centered; cell.border=thinBorder; }
    r++;

    row = ws.getRow(r);
    row.getCell(2).value = 'DAY';
    columns.forEach((c,i)=>{ row.getCell(3+i).value = c.weekday.toUpperCase(); });
    for(let c=2;c<=lastCol;c++){ const cell=row.getCell(c); cell.fill=fill(COLORS.gold); cell.font=font({bold:true}); cell.alignment=centered; cell.border=thinBorder; }
    r++;

    row = ws.getRow(r);
    row.getCell(2).value = 'TASK';
    columns.forEach((c,i)=>{
      const parts = [...(c.opNotes || [])];
      if(c.weeklyNote) parts.push(WEEKLY_NOTE_LABELS[c.weeklyNote] || c.weeklyNote);
      row.getCell(3+i).value = parts.join(' / ');
    });
    for(let c=2;c<=lastCol;c++){ const cell=row.getCell(c); cell.fill=fill(COLORS.blueBg); cell.border=thinBorder; cell.alignment=centered; cell.font = font(c===2?{bold:true}:{}); }
    r++;

    // NOTES row — mirrors whatever the manager typed into each day's Notes box in the tool
    if(dayNotes.some(n => n && n.trim())){
      row = ws.getRow(r);
      row.getCell(2).value = 'NOTES';
      columns.forEach((c,i)=>{ row.getCell(3+i).value = dayNotes[i] || ''; });
      for(let c=2;c<=lastCol;c++){ const cell=row.getCell(c); cell.fill=fill(COLORS.steelBlue); cell.border=thinBorder; cell.alignment=centered; cell.font = font({ color:{argb:COLORS.white}, bold: c===2 }); }
      r++;
    }
    r++;

    SECTION_ORDER.forEach(sec => {
      const rowsForRole = scheduleRowsForWeek.filter(rr => { const st = staffById[rr.staffId]; return st && st.role === sec.role && st.status === 'active'; });
      if(!rowsForRole.length) return;
      ws.mergeCells(r,2,r,lastCol);
      const hCell = ws.getCell(r,2);
      hCell.value = sec.label;
      hCell.font = font({ bold:true, color:{argb:COLORS.white} });
      hCell.fill = fill(COLORS.navy);
      hCell.alignment = centered;
      r++;
      rowsForRole.forEach(rowData => {
        const st = staffById[rowData.staffId];
        const rr2 = ws.getRow(r);
        const nameCell = rr2.getCell(2);
        nameCell.value = st ? st.name : '(unassigned)';
        nameCell.font = font({ bold:true });
        nameCell.border = thinBorder;
        rowData.shifts.forEach((sh,i)=>{
          const cell = rr2.getCell(3+i);
          cell.border = thinBorder;
          cell.alignment = centered;
          cell.font = font();
          if(sh.type==='COVER'){
            const times = to12hLabel(sh.csHH || '09', sh.csMM || '00') + ' - ' + to12hLabel(sh.ceHH || '17', sh.ceMM || '30');
            const dirLabel = sh.coverDirection === 'in' ? 'COVERING IN' : 'COVERING OUT';
            const note = (sh.coverNote || '').trim();
            cell.value = {
              richText: [
                { text: (note ? '(' + note + ')  ' : '') + times + '\n', font: font({ color:{argb:COLORS.white} }) },
                { text: dirLabel, font: font({ color:{argb:COLORS.white}, bold:true }) }
              ]
            };
            cell.fill = sh.coverDirection === 'in' ? fill(COLORS.deepSeaBlue) : fill(COLORS.steelBlue);
          } else {
            cell.value = exportCellText(sh);
            if(sh.type==='OFF' || sh.type==='OFFDAYR'){ cell.fill = fill(COLORS.purple); }
            else if(sh.type==='BL'){ cell.fill = fill(COLORS.teal); cell.font = font({ color:{argb:COLORS.white}, bold:true }); }
            else if(sh.type==='MC'){ cell.fill = fill(COLORS.red); cell.font = font({ color:{argb:COLORS.white}, bold:true }); }
            else if(sh.type==='AL'){ cell.fill = fill(COLORS.alGreen); }
          }
        });
        r++;
      });
    });

    r++;
    row = ws.getRow(r);
    row.getCell(2).value = 'HEADCOUNT';
    row.getCell(2).font = font({ bold:true });
    columns.forEach((c, di) => {
      const tally = {};
      scheduleRowsForWeek.forEach(rowData => {
        const st = staffById[rowData.staffId];
        if(!st || st.status !== 'active') return;
        const t = rowData.shifts[di].type;
        const key = t === 'COVER' ? 'COV' : t;
        if(key==='M' || key==='C' || key==='MID' || key==='CUSTOM' || key==='COV') tally[key] = (tally[key]||0) + 1;
      });
      row.getCell(3+di).value = ['M','MID','CUSTOM','C','COV'].filter(k=>tally[k]).map(k=>tally[k]+k).join(', ');
    });
    for(let c=2;c<=lastCol;c++){ const cell=row.getCell(c); cell.border=thinBorder; cell.alignment=centered; cell.font = font(c===2?{bold:true}:{}); }

    return r + 1; // next free row
  }
  function newStyledWorkbook(sheetName){
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet(sheetName);
    ws.columns = [{width:3},{width:19},{width:19},{width:19},{width:19},{width:19},{width:19},{width:19},{width:19}];
    return { wb, ws };
  }
  function downloadWorkbook(wb, filename){
    wb.xlsx.writeBuffer().then(buffer => {
      const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename + '.xlsx';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }).catch(err => {
      alert('Could not build the styled Excel file (' + err.message + ').');
    });
  }
  function exportWeekFile(){
    const columns = getColumns();
    const staffById = {};
    roster.forEach(s => { staffById[s.id] = s; });
    const filename = `zus_week_${weekKey(cal.month,cal.week)}_${new Date().toISOString().slice(0,10)}`;
    if(!window.ExcelJS){
      exportWeekFileCsvFallback(columns, staffById, SECTION_ORDER, filename);
      return;
    }
    const { wb, ws } = newStyledWorkbook(`Week ${cal.week} - ${MONTH_NAMES[cal.month-1]}`);
    writeWeekBlock(ws, 3, cal.month, cal.week, scheduleRows, roster, dailySales, customDayNotes);
    downloadWorkbook(wb, filename);
  }
  // Plain CSV export (no styling library, no colors) — smaller file, useful for quick testing.
  function exportWeekFileCsv(){
    const columns = getColumns();
    const staffById = {};
    roster.forEach(s => { staffById[s.id] = s; });
    const filename = `zus_week_${weekKey(cal.month,cal.week)}_${new Date().toISOString().slice(0,10)}`;
    exportWeekFileCsvFallback(columns, staffById, SECTION_ORDER, filename);
  }
  // Stacks every SAVED week (plus the one currently open) vertically in one sheet, in
  // chronological order, so you get everything "vertically visible" in a single import —
  // no manual copy/paste between tabs needed. Note: daily sales figures are only kept in
  // memory for the week you currently have open, so SALES ACHIEVED will be blank for
  // other weeks in this combined export.
  function exportAllWeeksFile(){
    if(!window.ExcelJS){ alert('This export needs the Excel styling library, which isn\'t available right now (check your internet connection) — try again once you\'re online.'); return; }
    persistCurrent(); // make sure the currently open week is included and up to date
    const ascending = Object.keys(weekArchive).sort((a,b)=>{
      const [am,aw] = a.split('-').map(Number), [bm,bw] = b.split('-').map(Number);
      return (am*10+aw) - (bm*10+bw);
    });
    if(!ascending.length){ alert('No saved weeks found to export yet.'); return; }
    const currentKey = weekKey(cal.month, cal.week);
    const idx = ascending.indexOf(currentKey);
    // Current week first, then step backward (older) to the earliest week, then wrap to
    // the newest week and continue backward down to just after the current week.
    const keys = idx === -1
      ? ascending.slice().reverse() // current week not saved yet (shouldn't happen after persistCurrent, but just in case) — fall back to plain newest-to-oldest
      : [ascending[idx], ...ascending.slice(0, idx).reverse(), ...ascending.slice(idx+1).reverse()];
    const { wb, ws } = newStyledWorkbook('All Weeks');
    let r = 3;
    keys.forEach(key => {
      const [m, w] = key.split('-').map(Number);
      const wk = weekArchive[key];
      const isCurrent = (m === cal.month && w === cal.week);
      r = writeWeekBlock(ws, r, m, w, wk.scheduleRows, wk.rosterSnapshot || roster, isCurrent ? dailySales : [null,null,null,null,null,null,null], isCurrent ? customDayNotes : wk.customDayNotes);
      r++; // extra spacer row between week blocks
    });
    downloadWorkbook(wb, `zus_all_weeks_${new Date().toISOString().slice(0,10)}`);
  }
  // Plain-text fallback (no colors/borders) if ExcelJS fails to load — same content, just flat.
  function exportWeekFileCsvFallback(columns, staffById, SECTION_ORDER, filename){
    const data = [];
    data.push([`${MONTH_NAMES[cal.month-1].toUpperCase()} ${YEAR} (WEEK ${cal.week})`]);
    data.push(['DATE', ...columns.map(c=>c.dateNum)]);
    data.push(['DAY', ...columns.map(c=>c.weekday.toUpperCase())]);
    data.push(['TASK', ...columns.map(c=>{
      const parts = [...(c.opNotes || [])];
      if(c.weeklyNote) parts.push(WEEKLY_NOTE_LABELS[c.weeklyNote] || c.weeklyNote);
      return parts.join(' / ');
    })]);
    if(customDayNotes.some(n => n && n.trim())){
      data.push(['NOTES', ...columns.map((c,i)=>customDayNotes[i]||'')]);
    }
    data.push([]);
    SECTION_ORDER.forEach(sec=>{
      const rowsForRole = scheduleRows.filter(r=>{ const st=staffById[r.staffId]; return st && st.role===sec.role && st.status==='active'; });
      if(!rowsForRole.length) return;
      data.push([sec.label]);
      rowsForRole.forEach(row=>{
        const st = staffById[row.staffId];
        data.push([st?st.name:'(unassigned)', ...row.shifts.map(sh=>exportCellText(sh))]);
      });
    });
    const esc = v => '"' + String(v==null?'':v).replace(/"/g,'""') + '"';
    const csv = data.map(row=>row.map(esc).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function attachListeners(){
    root.querySelectorAll('.zs-tab').forEach(tab=>{
      tab.addEventListener('click', e=>{ activeTab = e.target.dataset.tab; render(); });
    });
    const stateSel = document.getElementById('zs-state-select');
    if(stateSel) stateSel.addEventListener('change', e=>{
      saveCurrentStoreData();
      selectedState = e.target.value;
      selectedOutlet = (OUTLET_DATA[selectedState]||[])[0] || '';
      localStorage.setItem('zus_state', selectedState);
      localStorage.setItem('zus_outlet', selectedOutlet);
      loadStoreData(storeKey());
      render();
    });
    const outletSel = document.getElementById('zs-outlet-select');
    if(outletSel) outletSel.addEventListener('change', e=>{
      saveCurrentStoreData();
      selectedOutlet = e.target.value;
      localStorage.setItem('zus_state', selectedState);
      localStorage.setItem('zus_outlet', selectedOutlet);
      loadStoreData(storeKey());
      render();
    });
    const calMonth = document.getElementById('zs-cal-month');
    if(calMonth) calMonth.addEventListener('change', e=>{ switchWeek(parseInt(e.target.value), null); });
    const calWeek = document.getElementById('zs-cal-week');
    if(calWeek) calWeek.addEventListener('change', e=>{ switchWeek(null, parseInt(e.target.value)); });

    const bind = (id, field) => {
      const el = document.getElementById(id);
      if(el){
        el.addEventListener('blur', e=>{ targets[field] = e.target.value===''?'':parseFloat(e.target.value); persistCurrent(); });
        el.addEventListener('change', e=>{ targets[field] = e.target.value===''?'':parseFloat(e.target.value); render(); });
      }
    };
    bind('zs-sales-target-w','weeklySalesTarget');
    bind('zs-sales-target-m','monthlySalesTarget');
    bind('zs-cap-w','weeklyCap');
    bind('zs-cap-m','monthlyCap');
    [0,1,2,3,4,5,6].forEach(i=>{
      const el = document.getElementById('zs-daily-'+i);
      if(el){
        el.addEventListener('blur', e=>{
          dailySales[i] = e.target.value===''?null:parseFloat(e.target.value);
          persistCurrent();
          render();
        });
        el.addEventListener('change', e=>{
          dailySales[i] = e.target.value===''?null:parseFloat(e.target.value);
          persistCurrent();
          render();
        });
      }
    });
    root.querySelectorAll('.custom-note-input').forEach(el=>{
      el.addEventListener('blur', e=>{
        const idx = parseInt(e.target.dataset.dayNote);
        customDayNotes[idx] = e.target.value;
        persistCurrent();
      });
    });

    if(activeTab==='roster'){
      root.querySelectorAll('.rs-field').forEach(el=>{
        const evt = (el.type==='checkbox' || el.type==='select-one') ? 'change' : 'blur';
        el.addEventListener(evt, e=>{
          const id = e.target.dataset.id, field = e.target.dataset.field;
          const staff = roster.find(s=>s.id===id); // always edit the master/current roster, never a past week's frozen snapshot
          if(!staff) return;
          if(field==='standardHours' || field==='rate'){ staff[field] = e.target.value===''?0:parseFloat(e.target.value); }
          else if(field==='role'){
            staff.role = e.target.value;
            const d = ROLE_DEFAULTS[staff.role];
            staff.rate = d.rate; staff.standardHours = d.standardHours;
            if(staff.role==='PT') staff.maxHours = d.maxHours;
            if(staff.role==='CS'){ staff.csPosition = staff.csPosition||'FT'; staff.rate = ROLE_DEFAULTS['FT'].rate; }
          }
          else if(field==='csPosition'){
            staff.csPosition = e.target.value;
            staff.rate = e.target.value==='PT' ? ROLE_DEFAULTS['PT'].rate : ROLE_DEFAULTS['FT'].rate;
            staff.standardHours = ROLE_DEFAULTS[e.target.value].standardHours;
          }
          else { staff[field] = e.target.value; }
          render();
        });
      });
      const addBtn = document.getElementById('zs-add-staff');
      if(addBtn) addBtn.addEventListener('click', ()=>{
        const id = uid('st');
        roster.push({ id, name:'New Staff', role:'PT', status:'active', standardHours:8.5, rate:8.80, maxHours:8.5, note:'' });
        scheduleRows.push({ id:uid('row'), staffId:id, shifts:[0,1,2,3,4,5,6].map(()=>blankShift()) });
        render();
      });
      const resetRosterBtn = document.getElementById('zs-reset-roster-btn');
      if(resetRosterBtn) resetRosterBtn.addEventListener('click', ()=>{
        if(confirm('Clear the entire Staff Roster for this outlet? This removes every staff member and their current week\'s schedule row. Saved week history is not affected. Continue?')){
          roster = [];
          scheduleRows = [];
          persistCurrent();
          render();
        }
      });
      root.querySelectorAll('[data-remove-staff]').forEach(btn=>{
        btn.addEventListener('click', e=>{
          const id = e.target.dataset.removeStaff;
          roster = roster.filter(s=>s.id!==id);
          scheduleRows.forEach(r=>{ if(r.staffId===id) r.staffId=null; });
          delete otHours[id];
          render();
        });
      });
    } else {
      root.querySelectorAll('.zs-row-staff').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          row.staffId = e.target.value || null;
          render();
        });
      });
      root.querySelectorAll('.shift-type').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          const di = parseInt(e.target.dataset.day);
          row.shifts[di] = blankShift();
          row.shifts[di].type = e.target.value;
          persistCurrent();
          render();
        });
      });
      root.querySelectorAll('.mid-start').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          row.shifts[parseInt(e.target.dataset.day)].midStart = parseInt(e.target.value);
          persistCurrent();
          render();
        });
      });
      root.querySelectorAll('.time-pick select').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          if(!row) return;
          const di = parseInt(e.target.dataset.day), field = e.target.dataset.field;
          row.shifts[di][field] = e.target.value;
          render();
        });
      });
      root.querySelectorAll('.cover-dir').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          row.shifts[parseInt(e.target.dataset.day)].coverDirection = e.target.value;
          render();
        });
      });
      root.querySelectorAll('.cover-note').forEach(inp=>{
        inp.addEventListener('input', e=>{
          const row = scheduleRows.find(r=>r.id===e.target.dataset.row);
          row.shifts[parseInt(e.target.dataset.day)].coverNote = e.target.value;
        });
      });
      root.querySelectorAll('.ot-select').forEach(sel=>{
        sel.addEventListener('change', e=>{
          const staffId = e.target.dataset.staff;
          otHours[staffId] = parseFloat(e.target.value) || 0;
          render();
        });
      });
      const addRowBtn = document.getElementById('zs-add-row');
      if(addRowBtn) addRowBtn.addEventListener('click', ()=>{
        scheduleRows.push({ id:uid('row'), staffId:null, shifts:[0,1,2,3,4,5,6].map(()=>blankShift()) });
        render();
      });
      root.querySelectorAll('[data-remove-row]').forEach(btn=>{
        btn.addEventListener('click', e=>{
          scheduleRows = scheduleRows.filter(r=>r.id!==e.target.dataset.removeRow);
          render();
        });
      });
      const resetBtn = document.getElementById('zs-reset-btn');
      if(resetBtn) resetBtn.addEventListener('click', ()=>{
        if(confirm('Reset the Weekly Schedule for this week? All shifts will be cleared back to OFF. Staff Roster, targets, and saved history are not affected.')){
          // Only clear this week's shifts — keep the same staff rows, roster, targets, and history intact
          scheduleRows = scheduleRows.map(r => ({ id: uid('row'), staffId: r.staffId, shifts: [0,1,2,3,4,5,6].map(()=>blankShift()) }));
          persistCurrent();
          render();
        }
      });
      const exportWeekBtn = document.getElementById('zs-export-week-btn');
      if(exportWeekBtn) exportWeekBtn.addEventListener('click', ()=>{ exportWeekFile(); });
      const exportAllWeeksBtn = document.getElementById('zs-export-all-weeks-btn');
      if(exportAllWeeksBtn) exportAllWeeksBtn.addEventListener('click', ()=>{ exportAllWeeksFile(); });
      const exportWeekCsvBtn = document.getElementById('zs-export-week-csv-btn');
      if(exportWeekCsvBtn) exportWeekCsvBtn.addEventListener('click', ()=>{ exportWeekFileCsv(); });
      function handleWeekImportFile(file, inputEl){
        if(!file) return;
        readFileAsSheets(file, sheets => {
          const blocks = extractAllWeekBlocks(sheets);
          if(!blocks.length){ alert('Could not find a Mon\u2013Sun schedule in that file (checked ' + sheets.length + ' sheet(s)). Make sure at least one sheet has a row listing the days of the week, with staff names in the rows below it.'); return; }
          if(blocks.length === 1){
            startWeekImportReview(blocks[0].rows, blocks[0].weekLabel, blocks[0].dateLabel, blocks[0].titleLabel);
          } else {
            weekBlockChoice = { blocks };
            render();
          }
        });
        if(inputEl) inputEl.value = '';
      }
      const importWeekBtn = document.getElementById('zs-import-week-btn');
      const importWeekInput = document.getElementById('zs-import-week-input');
      if(importWeekBtn && importWeekInput) importWeekBtn.addEventListener('click', ()=>{ importWeekInput.click(); });
      if(importWeekInput) importWeekInput.addEventListener('change', e=>{ handleWeekImportFile(e.target.files[0], importWeekInput); });
      const importWeekCsvBtn = document.getElementById('zs-import-week-csv-btn');
      const importWeekCsvInput = document.getElementById('zs-import-week-csv-input');
      if(importWeekCsvBtn && importWeekCsvInput) importWeekCsvBtn.addEventListener('click', ()=>{ importWeekCsvInput.click(); });
      if(importWeekCsvInput) importWeekCsvInput.addEventListener('change', e=>{ handleWeekImportFile(e.target.files[0], importWeekCsvInput); });
      root.querySelectorAll('[data-choose-block]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const idx = parseInt(btn.dataset.chooseBlock, 10);
          const b = weekBlockChoice.blocks[idx];
          weekBlockChoice = null;
          startWeekImportReview(b.rows, b.weekLabel, b.dateLabel, b.titleLabel);
        });
      });
      const weekBlockCancelBtn = document.getElementById('zs-week-block-cancel');
      if(weekBlockCancelBtn) weekBlockCancelBtn.addEventListener('click', ()=>{ weekBlockChoice = null; render(); });
      const weekImportAddAllNewBtn = document.getElementById('zs-week-import-add-all-new');
      if(weekImportAddAllNewBtn) weekImportAddAllNewBtn.addEventListener('click', ()=>{
        weekImportReview.resolutions = weekImportReview.resolutions.map(r => r === 'SKIP' ? 'NEW' : r);
        render();
      });
      if(weekImportReview){
        root.querySelectorAll('.week-import-resolve').forEach(sel=>{
          sel.addEventListener('change', ()=>{
            const idx = parseInt(sel.dataset.idx, 10);
            weekImportReview.resolutions[idx] = sel.value;
            render();
          });
        });
        root.querySelectorAll('.week-import-show-all').forEach(link=>{
          link.addEventListener('click', (e)=>{
            e.preventDefault();
            const idx = parseInt(link.dataset.idx, 10);
            if(!weekImportReview.forceShowAll.includes(idx)) weekImportReview.forceShowAll.push(idx);
            render();
          });
        });
      }
      const weekImportApplyBtn = document.getElementById('zs-week-import-apply');
      if(weekImportApplyBtn) weekImportApplyBtn.addEventListener('click', ()=>{
        const entries = [];
        const selects = root.querySelectorAll('.week-import-resolve');
        selects.forEach(sel => {
          const idx = parseInt(sel.dataset.idx, 10);
          const item = weekImportReview.parsedRows[idx];
          const val = sel.value;
          if(val === 'SKIP') return;
          if(val === 'NEW'){
            const roleSel = root.querySelector(`.week-import-role[data-idx="${idx}"]`);
            const role = item.detectedRole || (roleSel ? roleSel.value : 'PT');
            const newStaff = { id: uid('st'), name: item.rawName, role, status: 'active', standardHours: ROLE_DEFAULTS[role].standardHours, rate: ROLE_DEFAULTS[role].rate, note: '' };
            roster.push(newStaff);
            entries.push({ staffId: newStaff.id, shifts: item.shifts });
          } else {
            entries.push({ staffId: val, shifts: item.shifts });
          }
        });
        applyWeekImport(entries);
      });
      const weekImportCancelBtn = document.getElementById('zs-week-import-cancel');
      if(weekImportCancelBtn) weekImportCancelBtn.addEventListener('click', ()=>{ weekImportReview = null; render(); });
      const importRealBtn = document.getElementById('zs-import-real-btn');
      if(importRealBtn) importRealBtn.addEventListener('click', ()=>{
        if(confirm('Import the 6 verified weeks from your real Straits City Excel data (June W1-4, July W1-2)? Weeks with no existing data will be added automatically. Weeks that already have data will show a comparison for you to choose.')){
          startImportReview();
        }
      });
      root.querySelectorAll('[data-keep-existing]').forEach(btn=>{
        btn.addEventListener('click', e=>{
          const key = e.target.dataset.keepExisting;
          resolveImportConflict(key, 'existing', null, null);
        });
      });
      root.querySelectorAll('[data-use-imported]').forEach(btn=>{
        btn.addEventListener('click', e=>{
          const key = e.target.dataset.useImported;
          const item = importConflicts.list.find(c => c.key === key);
          if(item) resolveImportConflict(key, 'imported', item.incomingRows, importConflicts.importRoster);
        });
      });
      root.querySelectorAll('[data-delete-week]').forEach(btn=>{
        btn.addEventListener('click', e=>{
          e.stopPropagation();
          const key = e.target.dataset.deleteWeek;
          const [m,w] = key.split('-').map(Number);
          if(confirm(`Permanently delete the saved ${MONTH_NAMES[m-1]} Week ${w} schedule? This can't be undone.`)){
            delete weekArchive[key];
            try { saveCurrentStoreData(); } catch(err){}
            render();
          }
        });
      });
      root.querySelectorAll('[data-toggle-month]').forEach(header=>{
        header.addEventListener('click', ()=>{
          const m = parseInt(header.dataset.toggleMonth);
          openMonths[m] = !openMonths[m];
          const group = root.querySelector(`.zs-month-group[data-month="${m}"]`);
          if(group){
            group.classList.toggle('open', !!openMonths[m]);
            const chevron = group.querySelector('.zs-month-chevron');
            if(chevron) chevron.style.transform = openMonths[m] ? 'rotate(90deg)' : '';
          }
        });
      });
      root.querySelectorAll('[data-toggle-sheet]').forEach(header=>{
        header.addEventListener('click', ()=>{
          const sheetName = header.dataset.toggleSheet;
          openImportSheets[sheetName] = !openImportSheets[sheetName];
          const group = root.querySelector(`.zs-month-group[data-sheet="${CSS.escape(sheetName)}"]`);
          if(group){
            group.classList.toggle('open', !!openImportSheets[sheetName]);
            const chevron = group.querySelector('.zs-month-chevron');
            if(chevron) chevron.style.transform = openImportSheets[sheetName] ? 'rotate(90deg)' : '';
          }
        });
      });
    }
  }

  render();
})();
</script>
