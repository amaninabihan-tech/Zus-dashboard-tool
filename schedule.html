  // ── Per-store data isolation ─────────────────────────────────────────────
  // Every store (identified by STATE::OUTLET) gets its own completely independent
  // weekArchive, roster, and targets. Switching stores saves the current store's
  // data and loads (or creates fresh) the target store's data.
  function storeKey(){ return selectedState + '::' + selectedOutlet; }

  let allStoreData = {};   // { "STATE::OUTLET": { weekArchive, roster, targets, cal } }

  function blankRoster(){
    // Any outlet other than Straits City starts completely empty -- no placeholder slots.
    // The manager adds staff explicitly via "+ Add Staff" when setting up a new outlet.
    return [];
  }
  function blankTargets(){
    return {
      weeklySalesTarget: 0, monthlySalesTarget: 0,
      actualSalesWeekly: '', weeklyCap: 0, monthlyCap: 0,
      dailySales: [null,null,null,null,null,null,null],
    };
  }

  function saveCurrentStoreData(){
    // Save the current week into weekArchive -- roster here represents the staff/roles
    // as of THIS specific week, so re-saving never overwrites a different week's history.
    weekArchive[weekKey(cal.month, cal.week)] = {
      scheduleRows: JSON.parse(JSON.stringify(scheduleRows)),
      rosterSnapshot: JSON.parse(JSON.stringify(roster)),
      customDayNotes: JSON.parse(JSON.stringify(customDayNotes)),
      savedAt: Date.now()
    };
    allStoreData[storeKey()] = {
      weekArchive: JSON.parse(JSON.stringify(weekArchive)),
      roster: JSON.parse(JSON.stringify(roster)),
      targets: JSON.parse(JSON.stringify(targets)),
      cal: JSON.parse(JSON.stringify(cal)),
    };
    try { localStorage.setItem('zus_all_stores', JSON.stringify(allStoreData)); } catch(e){}
  }

  // Like saveCurrentStoreData, but does NOT re-overwrite weekArchive[cal.month/week] first --
  // use this after bulk operations (like import) that have already set specific week entries
  // directly, so the currently-viewed week isn't accidentally clobbered.
  function flushStoreDataOnly(){
    allStoreData[storeKey()] = {
      weekArchive: JSON.parse(JSON.stringify(weekArchive)),
      roster: JSON.parse(JSON.stringify(roster)),
      targets: JSON.parse(JSON.stringify(targets)),
      cal: JSON.parse(JSON.stringify(cal)),
    };
    try { localStorage.setItem('zus_all_stores', JSON.stringify(allStoreData)); } catch(e){}
    try { localStorage.setItem('zus_state', selectedState); localStorage.setItem('zus_outlet', selectedOutlet); } catch(e){}
  }

  function loadStoreData(sk){
    if(allStoreData[sk]){
      const d = allStoreData[sk];
      weekArchive = JSON.parse(JSON.stringify(d.weekArchive || {}));
      roster = JSON.parse(JSON.stringify(d.roster || []));
      targets = Object.assign(blankTargets(), d.targets || {});
      cal = d.cal ? JSON.parse(JSON.stringify(d.cal)) : { month: new Date().getMonth()+1, week: 1 };
      cal.week = Math.min(cal.week, weeksInMonth(cal.month));
      const wk = weekKey(cal.month, cal.week);
      if(weekArchive[wk]){
        scheduleRows = JSON.parse(JSON.stringify(weekArchive[wk].scheduleRows || []));
        customDayNotes = JSON.parse(JSON.stringify(weekArchive[wk].customDayNotes || ['','','','','','','']));
        roster = weekArchive[wk].rosterSnapshot ? JSON.parse(JSON.stringify(weekArchive[wk].rosterSnapshot)) : findMostRecentPriorRoster(cal.month, cal.week, roster);
      } else {
        // Week not found but keep the weekArchive intact -- inherit roster from the most
        // recent prior week (so ongoing role changes carry forward correctly)
        roster = findMostRecentPriorRoster(cal.month, cal.week, roster);
        scheduleRows = roster.filter(s=>s.status==='active').map(s=>({ id:uid('row'), staffId:s.id, shifts:[0,1,2,3,4,5,6].map(()=>blankShift()) }));
        customDayNotes = ['','','','','','',''];
      }
    } else {
      // Brand new store — blank roster (4 unassigned slots) AND matching blank schedule rows
      weekArchive = {};
      roster = blankRoster();
      targets = blankTargets();
      cal = { month: new Date().getMonth()+1, week: 1 };
      scheduleRows = roster.map(s=>({ id:uid('row'), staffId:s.id, shifts:[0,1,2,3,4,5,6].map(()=>blankShift()) }));
      customDayNotes = ['','','','','','',''];
    }
    // Bump uid counter to avoid collisions
    const allIds = [...(roster||[]).map(s=>s.id), ...scheduleRows.map(r=>r.id),
      ...Object.values(weekArchive).flatMap(w=>(w.scheduleRows||[]).map(r=>r.id))];
    allIds.forEach(id=>{ const n=parseInt((id||'').split('_').pop()); if(!isNaN(n)&&n>=uidCounter) uidCounter=n+1; });
  }

  // Real Monday-anchored calendar weeks: find the Monday on/before the 1st of the month,
  // so every week block genuinely runs Monday -> Sunday per the actual 2026 calendar,
  // even if it means a week spills a few days into the previous or next month.
  function mondayAnchor(month){
    const d1 = new Date(YEAR, month-1, 1);
    const dow = d1.getDay(); // 0=Sun..6=Sat
    const offsetFromMonday = (dow === 0) ? 6 : dow - 1; // days after Monday that day 1 falls on
    const anchor = new Date(YEAR, month-1, 1 - offsetFromMonday);
    return anchor;
  }
  function weeksInMonth(month){
    // Weeks in this month = distance (in 7-day blocks) between this month's Monday anchor
    // and next month's Monday anchor. Gives 4 weeks most of the time, and correctly gives
    // 5 (occasionally 6) only for the months that genuinely need it -- no drift, no gaps,
    // and no unnecessary 5th-week option cluttering months that don't need one.
    const nextMonth = month === 12 ? 1 : month + 1;
    const nextYear = month === 12 ? YEAR + 1 : YEAR;
    const a1 = mondayAnchor(month);
    const nm1 = new Date(nextYear, nextMonth - 1, 1);
    const dow2 = nm1.getDay();
    const off2 = (dow2 === 0) ? 6 : dow2 - 1;
    const a2 = new Date(nextYear, nextMonth - 1, 1 - off2);
    const diffDays = Math.round((a2 - a1) / (1000 * 60 * 60 * 24));
    return Math.max(Math.round(diffDays / 7), 1);
  }

  // Recurring operational routine notes, computed purely from the real date -- applies
  // identically across every state and every store.
  //   Monday    : Calibration, Stocks Ordering, Weekly Stocks Take
  //               EXCEPT: no Weekly Stocks Take if EOM falls Mon/Tue/Wed/Thu of THIS week
  //               (the EOM count already covers it), or if EOM fell Fri/Sat/Sun of the
  //               PREVIOUS week (too close together -- the week after that resumes normally).
  //   Thursday  : Calibration
  //   Friday    : Stocks Receiving
  //   Saturday  : Check Stocks for Ordering
  //   Any day   : EOM Stocks Take, if that date is the real last calendar day of its month (28/29/30/31)
  function isEOMDate(d){
    const m = d.getMonth()+1;
    return d.getDate() === daysInMonth(m);
  }
  function shouldSkipWeeklyStockTake(mondayDate){
    for(let off=0; off<=3; off++){
      const d = new Date(mondayDate.getFullYear(), mondayDate.getMonth(), mondayDate.getDate()+off);
      if(isEOMDate(d)) return true;
    }
    for(let off=1; off<=3; off++){
      const d = new Date(mondayDate.getFullYear(), mondayDate.getMonth(), mondayDate.getDate()-off);
      if(isEOMDate(d)) return true;
    }
    return false;
  }
  function operationalNotesFor(dateNum, weekdayIdx, month){
    const notes = [];
    const lastDay = daysInMonth(month);
    const isEOM = dateNum === lastDay;
    if(isEOM) notes.push('EOM Stock Take');
    if(weekdayIdx === 1){ // Monday
      notes.push('Calibration');
      notes.push('Stocks Ordering');
      const mondayDate = new Date(YEAR, month-1, dateNum);
      if(!shouldSkipWeeklyStockTake(mondayDate)){ notes.push('Weekly Stock Take'); }
    } else if(weekdayIdx === 4){ // Thursday
      notes.push('Calibration');
    } else if(weekdayIdx === 5){ // Friday
      notes.push('Stocks Receiving');
    } else if(weekdayIdx === 6){ // Saturday
      notes.push('Check Stocks for Ordering');
    }
    return notes;
  }

  // role change made this week correctly carries forward to every future week until
  // changed again, without touching any week before it.
  function findMostRecentPriorRoster(month, week, fallback){
    const targetOrder = weekOrder(month, week);
    let best = null, bestOrder = -1;
    Object.keys(weekArchive).forEach(key=>{
      const [m,w] = key.split('-').map(Number);
      const order = weekOrder(m,w);
      if(order < targetOrder && order > bestOrder && weekArchive[key].rosterSnapshot){
        bestOrder = order;
        best = weekArchive[key].rosterSnapshot;
      }
    });
    return best ? JSON.parse(JSON.stringify(best)) : JSON.parse(JSON.stringify(fallback));

  function buildImportRoster(){
    // Collect every distinct staff name across the 6 imported weeks, using the role
    // from the LATEST week they appear in (roles evolved over time, e.g. Nabihan PT->FT).
    const latestRole = {};
    STRAITS_CITY_IMPORT_DATA.forEach(wk=>{
      wk.staff.forEach(s=>{
        if(!s.name) return;
        latestRole[s.name] = s.role; // later weeks overwrite earlier ones since array is chronological
      });
    });
    const merged = [];
    Object.keys(latestRole).forEach(name=>{
      const role = latestRole[name];
      const existing = roster.find(r => r.name.trim().toUpperCase() === name.trim().toUpperCase());
      if(existing){
        // keep their id/rate, just sync role if it changed
        if(existing.role !== role){
          existing.role = role;
          const d = ROLE_DEFAULTS[role];
          if(d){ existing.rate = d.rate; existing.standardHours = d.standardHours; }
        }
        merged.push(existing);
      } else {
        const d = ROLE_DEFAULTS[role] || ROLE_DEFAULTS['PT'];
        merged.push({
          id: uid('st'), name: titleCase(name), role, status:'active',
          standardHours: d.standardHours, rate: d.rate, maxHours: d.maxHours,
          note:''
        });
      }
    });
    return merged;
  }

  function titleCase(s){ return s.split(' ').map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' '); }

  function buildImportScheduleRows(wk, importRoster){
    return wk.staff.filter(s=>s.name).map(s=>{
      const staffEntry = importRoster.find(r => r.name.trim().toUpperCase() === s.name.trim().toUpperCase());
      return {

        staffId: staffEntry ? staffEntry.id : null,

  // assignments from the source data (not the merged/latest-role master roster) --
  // this is what makes Nabihan correctly show PT in June and FT in July.
  function buildWeekRosterSnapshot(wk, masterRoster){
    return wk.staff.filter(s=>s.name).map(s=>{
      const masterEntry = masterRoster.find(r => r.name.trim().toUpperCase() === s.name.trim().toUpperCase());
      const d = ROLE_DEFAULTS[s.role] || ROLE_DEFAULTS['PT'];
      return {

        role: s.role, status: 'active',
        standardHours: d.standardHours, rate: d.rate, maxHours: d.maxHours,
        note:''
      };
    });
  }

  function resolveImportConflict(key, choice, incomingRows, importRoster){
    if(choice === 'imported'){
      const item = importConflicts.list.find(c => c.key === key);
      const snapshot = item ? item.weekSnapshot : JSON.parse(JSON.stringify(importRoster));
      weekArchive[key] = { scheduleRows: incomingRows, rosterSnapshot: snapshot, savedAt: Date.now() };
    }
    // 'existing' choice: leave weekArchive[key] untouched
    importConflicts.list = importConflicts.list.filter(c => c.key !== key);
    flushStoreDataOnly();
    if(importConflicts.list.length === 0){
      importConflicts = null;
      // Refresh the live in-memory view in case the currently-displayed week was just resolved,

      const currentKey = weekKey(cal.month, cal.week);

        scheduleRows = JSON.parse(JSON.stringify(weekArchive[currentKey].scheduleRows));
        roster = JSON.parse(JSON.stringify(weekArchive[currentKey].rosterSnapshot));
      }
    }
    render();
  }


  // ---------- OVERTIME (weekly, per staff) ----------
  let otHours = {}; // { staffId: 0.5-step number of OT hours this week }
  const OT_STEPS = [0, 0.5, 1, 1.5, 2, 2.5, 3];
  function getOtHours(staffId){ return otHours[staffId] || 0; }
  function otRateFor(staff){ return staff ? staff.rate * 1.5 : 0; }
  function otCostFor(staffId){
    const staff = getStaff(staffId);
    return getOtHours(staffId) * otRateFor(staff);
  }
  function totalOtCost(){
    let t = 0;
    roster.forEach(s => { t += otCostFor(s.id); });
    return t;
  }

  // ---------- PERSISTENCE (saved in this browser only) ----------
  let weekArchive = {}; // { "month-week": { scheduleRows, rosterSnapshot, otHours, savedAt } }
  try {
    const savedState = localStorage.getItem('zus_state');
    const savedOutlet = localStorage.getItem('zus_outlet');
    const savedAllStores = localStorage.getItem('zus_all_stores');
    if(savedState && STATE_HOLIDAYS[savedState]) selectedState = savedState;
    if(savedOutlet) selectedOutlet = savedOutlet;
    if(!selectedOutlet) selectedOutlet = (OUTLET_DATA[selectedState]||[])[0] || '';
    if(savedAllStores) allStoreData = JSON.parse(savedAllStores);

    // One-time forced cleanup across EVERY saved store: wipe any note text saved from an
    // earlier session (roster + every historical week's own snapshot), since a code change
    // alone can't retroactively clear data already saved in the browser.
    if(!localStorage.getItem('zus_notes_cleared_v1')){
      Object.values(allStoreData).forEach(store=>{
        if(store.roster) store.roster.forEach(s=>{ s.note=''; });
        if(store.weekArchive) Object.values(store.weekArchive).forEach(w=>{
          if(w.rosterSnapshot) w.rosterSnapshot.forEach(s=>{ s.note=''; });
        });
      });
      try { localStorage.setItem('zus_all_stores', JSON.stringify(allStoreData)); } catch(e){}
      try { localStorage.setItem('zus_notes_cleared_v1', '1'); } catch(e){}
    }

    // Migrate legacy single-store data if present and this store has no meaningful roster yet.
    // Gated + self-clearing so this can only ever apply once, to the very first store loaded
    // after upgrading -- it must never bleed old data into a different/new outlet later.
    if(!localStorage.getItem('zus_legacy_migrated_v1')){
      const legacyWeeks = localStorage.getItem('zus_weeks');
      const legacyRoster = localStorage.getItem('zus_roster');
      const legacyTargets = localStorage.getItem('zus_targets');
      const legacyCal = localStorage.getItem('zus_cal');
      const existingStore = allStoreData[storeKey()];
      const storeHasData = existingStore && existingStore.roster && existingStore.roster.length > 0;
      if(!storeHasData && legacyRoster){
        // Legacy data found — migrate it to this store slot, preserving it
        allStoreData[storeKey()] = {
          weekArchive: legacyWeeks ? JSON.parse(legacyWeeks) : {},
          roster: JSON.parse(legacyRoster),
          targets: legacyTargets ? JSON.parse(legacyTargets) : {},
          cal: legacyCal ? JSON.parse(legacyCal) : null,
        };
      }
      try {
        localStorage.removeItem('zus_weeks'); localStorage.removeItem('zus_roster');
        localStorage.removeItem('zus_targets'); localStorage.removeItem('zus_cal');
      } catch(e){}
      try { localStorage.setItem('zus_legacy_migrated_v1', '1'); } catch(e){}
    }

    // ── One-time cleanup: keep only Straits City (Penang) data, clear everything else ──
    if(!localStorage.getItem('zus_cleanup_straits_v1')){
      const keepKey = 'PENANG::Straits City';
      Object.keys(allStoreData).forEach(k=>{
        if(k !== keepKey) delete allStoreData[k];
      });
      try { localStorage.setItem('zus_all_stores', JSON.stringify(allStoreData)); } catch(e){}
      try { localStorage.setItem('zus_cleanup_straits_v1', '1'); } catch(e){}
    }

    // ── One-time sweep: any OTHER outlet already sitting in storage (created after the
    // cleanup above ran, e.g. by just visiting it) gets reset to a genuinely empty roster
    // and schedule -- no placeholder slots. Straits City's real data is left untouched. ──
    if(!localStorage.getItem('zus_empty_template_v1')){
      const keepKey = 'PENANG::Straits City';
      let anyChanged = false;
      Object.keys(allStoreData).forEach(k=>{
        if(k === keepKey) return;
        allStoreData[k] = { weekArchive: {}, roster: [], targets: blankTargets(), cal: null };
        anyChanged = true;
      });
      if(anyChanged){ try { localStorage.setItem('zus_all_stores', JSON.stringify(allStoreData)); } catch(e){} }
      try { localStorage.setItem('zus_empty_template_v1', '1'); } catch(e){}
    }

    // Load this store's data
    loadStoreData(storeKey());

    // ── One-time migration: PTS1/PTS2 no longer exist as shift types -- convert any
    // saved entries (in every saved week, plus the currently loaded week) into CUSTOM
    // shifts carrying the exact same hours they used to represent, instead of losing them. ──
    if(!localStorage.getItem('zus_pts_migration_v1')){
      const migrateShift = s => {
        if(s.type === 'PTS1'){ s.type='CUSTOM'; s.csHH='18'; s.csMM='30'; s.ceHH='22'; s.ceMM='30'; return true; }
        if(s.type === 'PTS2'){ s.type='CUSTOM'; s.csHH='08'; s.csMM='30'; s.ceHH='14'; s.ceMM='00'; return true; }
        return false;
      };
      const migrateRows = rows => (rows||[]).reduce((changed, row) => {
        (row.shifts||[]).forEach(sh => { if(migrateShift(sh)) changed = true; });
        return changed;
      }, false);
      let anyChanged = migrateRows(scheduleRows);
      Object.values(weekArchive).forEach(wk => { if(migrateRows(wk.scheduleRows)) anyChanged = true; });
      if(anyChanged){ try { saveCurrentStoreData(); } catch(e){} }
      try { localStorage.setItem('zus_pts_migration_v1', '1'); } catch(e){}
    }

    // ── Prevent ID collisions: bump uidCounter above every existing numeric ID suffix ──
    const allIds = [
      ...roster.map(s=>s.id),
      ...scheduleRows.map(r=>r.id),
      ...Object.values(weekArchive).flatMap(w=>(w.scheduleRows||[]).map(r=>r.id))
    ];
    allIds.forEach(id=>{
      const n = parseInt((id||'').split('_').pop());
      if(!isNaN(n) && n >= uidCounter) uidCounter = n + 1;
    });
  } catch(e){ console.warn('Saved schedule data could not be loaded:', e); }

  function persistCurrent(){
    try {
      weekArchive[weekKey(cal.month, cal.week)] = {
        scheduleRows: JSON.parse(JSON.stringify(scheduleRows)),
        rosterSnapshot: JSON.parse(JSON.stringify(roster)),
        customDayNotes: JSON.parse(JSON.stringify(customDayNotes)),
        savedAt: Date.now()
      };
      saveCurrentStoreData();
      localStorage.setItem('zus_state', selectedState);
      localStorage.setItem('zus_outlet', selectedOutlet);
    } catch(e){ console.warn('Could not save schedule data:', e); }
  }

  function switchWeek(newMonth, newWeek){
    persistCurrent();
    if(newMonth!==null) cal.month = newMonth;
    cal.week = Math.min(newWeek!==null ? newWeek : cal.week, weeksInMonth(cal.month));
    const key = weekKey(cal.month, cal.week);
    if(weekArchive[key]){
      scheduleRows = JSON.parse(JSON.stringify(weekArchive[key].scheduleRows));
      customDayNotes = JSON.parse(JSON.stringify(weekArchive[key].customDayNotes || ['','','','','','','']));
      roster = weekArchive[key].rosterSnapshot ? JSON.parse(JSON.stringify(weekArchive[key].rosterSnapshot)) : findMostRecentPriorRoster(cal.month, cal.week, roster);
    } else {
      // blank/new week: keep same staff rows but clear shifts, and inherit the roster
      // (roles/rates) from the most recent PRIOR week -- so a role change made last week
      // correctly carries forward, without touching any week before it.
      const inherited = findMostRecentPriorRoster(cal.month, cal.week, roster);
      scheduleRows = inherited.filter(s=>s.status==='active').map(s => ({ id: uid('row'), staffId: s.id, shifts: [0,1,2,3,4,5,6].map(()=>blankShift()) }));
      customDayNotes = ['','','','','','',''];
      roster = inherited;
    }
    render();
  }

  let activeTab = 'schedule';
  let importConflicts = null; // when set, shows the "review conflicts" screen instead of the normal schedule
  let weekImportReview = null; // when set, shows the "confirm unmatched names" screen for a Week Import (CSV/Excel)
  let weekBlockChoice = null; // when set, shows a "pick which week" screen for files with multiple week blocks

  const root = document.getElementById('zus-scheduler');

  function getStaff(id){ return roster.find(s=>s.id===id); }

  // For a day that's "borrowed" from a different month (e.g. June 29-30 sitting inside
  // July's Week 1), look up what role this staff actually held THAT month, instead of
  // blindly using the currently-displayed week's role. Promotions always take effect on
  // the 1st, so any saved week within the prior month carries the correct pre-promotion
  // role. Falls back to the current-week staff object if no historical record exists yet.
  function getEffectiveStaffForDay(baseStaff, col){
    if(!baseStaff || !col || col.inSelectedMonth !== false) return baseStaff;
    const realMonth = col.month;
    const lastWk = weeksInMonth(realMonth);
    for(let w = lastWk; w >= 1; w--){
      const key = weekKey(realMonth, w);
      if(weekArchive[key] && weekArchive[key].rosterSnapshot){
        const found = weekArchive[key].rosterSnapshot.find(s => s.id === baseStaff.id);
        if(found) return found;
      }
    }
    return baseStaff;
  }

  function getColumnsFor(month, week){
    const anchor = mondayAnchor(month);
    const weekStart = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate() + (week-1)*7);
    const cols = [];
    for(let i=0;i<7;i++){
      const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
      const dateNum = d.getDate();
      const dMonth = d.getMonth() + 1; // the ACTUAL month this date belongs to (may differ from selected month near boundaries)
      const weekday = WEEKDAY_NAMES[d.getDay()];
      const holiday = (STATE_HOLIDAYS[selectedState] || {})[`${dMonth}-${dateNum}`] || null;
      // ZUS Day: recurring every Tuesday, applies across all states and stores
      const weeklyNote = (d.getDay()===2) ? 'ZDB3F1' : null;
      const inSelectedMonth = dMonth === month;
      const opNotes = operationalNotesFor(dateNum, d.getDay(), dMonth);
      cols.push({ valid:true, dateNum, weekday, isWeekend: (d.getDay()===0||d.getDay()===6), holiday, weeklyNote, month: dMonth, inSelectedMonth, opNotes });
    }
    return cols;
  }
  function getColumns(){ return getColumnsFor(cal.month, cal.week); }

  function shiftHours(shift, staff){
    const role = staff ? staff.role : null;
    if(shift.type==='OFF'){
      if(role==='OS' || role==='FT'){
        return { gross:0, paid:8.5, label:'Paid Off Day', paidOff:true };
      }
      return { gross:0, paid:0, label:'' };
    }
    if(shift.type==='OFFDAYR'){
      // Requested day off: paid only for OS/FT, unpaid for PT/CS
      if(role==='OS' || role==='FT'){
        return { gross:0, paid:8.5, label:'Requested Off (Paid)', paidOff:true };
      }
      return { gross:0, paid:0, label:'', paidOff:false };
    }
    if(shift.type==='AL'){
      if(role==='OS' || role==='FT') return { gross:0, paid:8.5, label:'Annual Leave', paidOff:true };
      return { gross:0, paid:0, label:'', paidOff:false };
    }
    if(shift.type==='BL'){
      // Birthday Leave: only meaningful for OS/FT, paid 8.5h same as off day
      if(role==='OS' || role==='FT') return { gross:0, paid:8.5, label:'Birthday Leave', paidOff:true };
      return { gross:0, paid:0, label:'', paidOff:false };
    }
    if(shift.type==='MC'){
      // Medical Certificate Leave: unpaid for everyone
      return { gross:0, paid:0, label:'MC', paidOff:false };
    }
    if(shift.type==='M'){ const g=(M_END-M_START)/60; return { gross:g, paid:paidHoursFor(g,role,staff), label: labelRange(M_START,M_END) }; }
    if(shift.type==='C'){ const g=(C_END-C_START)/60; return { gross:g, paid:paidHoursFor(g,role,staff), label: labelRange(C_START,C_END) }; }
    if(shift.type==='MID'){
      const stdH = staff ? staff.standardHours : 8.5;
      const start = shift.midStart;
      const end = start + stdH*60;
      return { gross:stdH, paid:paidHoursFor(stdH,role,staff), label: labelRange(start,end) };
    }
    if(shift.type==='CUSTOM'){
      if(shift.csHH==='' || shift.csMM==='' || shift.ceHH==='' || shift.ceMM===''){ return { gross:0, paid:0, label:'' }; }
      const startMin = parseInt(shift.csHH)*60 + parseInt(shift.csMM);
      const endMin = parseInt(shift.ceHH)*60 + parseInt(shift.ceMM);
      if(endMin<=startMin) return { gross:0, paid:0, label:'' };
      const g = (endMin-startMin)/60;
      return { gross:g, paid:paidHoursFor(g,role,staff), label: labelRange(startMin,endMin) };
    }
    if(shift.type==='COVER'){
      if(shift.csHH==='' || shift.csMM==='' || shift.ceHH==='' || shift.ceMM===''){ return { gross:0, paid:0, label:'', coverOut:(shift.coverDirection==='out') }; }
      const startMin = parseInt(shift.csHH)*60 + parseInt(shift.csMM);
      const endMin = parseInt(shift.ceHH)*60 + parseInt(shift.ceMM);
      if(endMin<=startMin) return { gross:0, paid:0, label:'', coverOut:(shift.coverDirection==='out') };
      const g = (endMin-startMin)/60;
      // Cover OUT = staff goes to another outlet, NOT charged to our budget (paid=0 for cost)
      // Cover IN = external staff covers us, IS charged to our budget
      const coverOut = shift.coverDirection==='out';
      return { gross:g, paid: coverOut ? 0 : paidHoursFor(g,role,staff), label: labelRange(startMin,endMin), coverOut };
    }
    return { gross:0, paid:0, label:'' };
  }

  function rowWeekly(row, columns){
    columns = columns || getColumns();
    const staff = getStaff(row.staffId);
    let gross=0, paid=0, cost=0;
    const breakdown = {}; // { 'PT': {days, hours, cost}, 'FT': {...} } -- only populated when a day's effective role differs from the base staff's current role
    row.shifts.forEach((sh, di) => {
      const col = columns[di];
      const effStaff = getEffectiveStaffForDay(staff, col);
      const h = shiftHours(sh, effStaff);
      gross += h.gross;
      paid += h.paid;
      const dayCost = h.paid * (effStaff ? effStaff.rate : 0);
      cost += dayCost;
      if(effStaff && h.paid > 0){
        const key = effStaff.role + (effStaff.role==='CS' ? (':'+(effStaff.csPosition||'FT')) : '');
        if(!breakdown[key]) breakdown[key] = { days:0, hours:0, cost:0, rate: effStaff.rate };
        breakdown[key].days += 1;
        breakdown[key].hours += h.paid;
        breakdown[key].cost += dayCost;
      }
    });
    const otH = row.staffId ? getOtHours(row.staffId) : 0;
    const otC = row.staffId ? otCostFor(row.staffId) : 0;
    const mixedRate = Object.keys(breakdown).length > 1;
    return { gross, paid, cost: cost + otC, baseCost: cost, otHours: otH, otCost: otC, staff, breakdown, mixedRate };
  }

  function staffWeeklyGross(staffId, columns){
    columns = columns || getColumns();
    let g = 0;
    const staff = getStaff(staffId);
    scheduleRows.forEach(r=>{
      if(r.staffId===staffId) r.shifts.forEach((sh, di)=>{
        const effStaff = getEffectiveStaffForDay(staff, columns[di]);
        g += shiftHours(sh, effStaff).gross;
      });
    });
    return g;
  }

  function totalWeeklyCost(){
    const columns = getColumns();
    let t = 0;
    scheduleRows.forEach(r => { t += rowWeekly(r, columns).cost; });
    return t;
  }

  function roleSubtotal(role){
    const columns = getColumns();
    let paid=0, cost=0;
    scheduleRows.forEach(r=>{
      const staff = getStaff(r.staffId);
      if(staff && staff.role===role){ const w = rowWeekly(r, columns); paid+=w.paid; cost+=w.cost; }
    });
    return {paid, cost};
  }

  function headcountForDay(di){
    let m=0, mid=0, c=0, cov=0, custom=0;
    scheduleRows.forEach(r=>{
      const t = r.shifts[di].type;
      if(t==='M') m++; else if(t==='MID') mid++; else if(t==='C') c++;
      else if(t==='CUSTOM') custom++; else if(t==='COVER') cov++;
    });
    return {m,mid,c,cov,custom};
  }

  function validate(columns){
    const violations = [];
    const notices = [];
    scheduleRows.forEach((row, ri) => {
      const staff = getStaff(row.staffId);
      const working = row.shifts.map((s,i)=>({s,i})).filter(x=>x.s.type!=='OFF' && x.s.type!=='OFFDAYR' && x.s.type!=='AL' && x.s.type!=='BL' && x.s.type!=='MC');
      if(!staff){
        if(working.length>0) violations.push(`Row ${ri+1}: shifts are set but no staff is assigned. Pick a name.`);
        return;
      }
      if(staff.status==='inactive' && working.length>0){
        violations.push(`${staff.name} is marked inactive/resigned but has shifts scheduled this week.`);
      }
      working.forEach(x=>{
        const effStaff = getEffectiveStaffForDay(staff, columns[x.i]);
        const {gross} = shiftHours(x.s, effStaff);
        const col = columns[x.i];
        const dayTag = col && col.valid ? `${col.weekday} ${ordinal(col.dateNum)}` : `day ${x.i+1}`;
        // Rule 1 — all roles: shift under 4h is a red violation
        if(gross>0 && gross<4){
          violations.push(`${staff.name}: ${dayTag} shift is ${gross.toFixed(1)}h - below the 4h minimum.`);
        }
        // Rule 2 — OS and FT: every working shift must be 8.5h
        else if((effStaff.role==='OS' || effStaff.role==='FT') && gross>0 && gross<8.5){
          violations.push(`${staff.name}: ${dayTag} shift is ${gross.toFixed(1)}h - below the 8.5h full-day requirement for OS/FT.`);
        }
        // Rule 3 — CS: follows their position's day rule
        else if(effStaff.role==='CS'){
          const pos = effStaff.csPosition || 'FT';
          if(pos==='FT' && gross>0 && gross<8.5){
            violations.push(`${staff.name}: ${dayTag} shift is ${gross.toFixed(1)}h - below the 8.5h requirement for CS (FT position).`);
          }
        }
        // Unset CUSTOM/COVER time
        if((x.s.type==='CUSTOM' || x.s.type==='COVER') && gross===0){
          notices.push(`${staff.name}: ${dayTag} ${x.s.type} shift has no start or end time set yet.`);
        }
      });
      // Rule 4 — max days per week (optional per-staff setting, no role default)
    });
    // Rule 5 — role-based weekly hour minimum (purely by role, no per-staff exceptions)
    // PT: 31.5h/week amber notice. FT/OS/CS: no weekly minimum (8.5h/shift rule covers them).
    roster.forEach(staff=>{
      if(staff.role==='PT' && staff.status==='active'){
        const g = staffWeeklyGross(staff.id, columns);
        if(g < 31.5){
          notices.push(`${staff.name} (PT): scheduled ${g.toFixed(1)}h this week - below the 31.5h PT contract minimum.`);
        }
      }
      // Rule 6 — always flag inactive/resigned staff still in the roster, as a reminder
      if(staff.status==='inactive'){
        notices.push(`${staff.name} is marked Inactive / Resigned. Confirm they should be removed from payroll if this is final.`);
      }
    });
    return { violations, notices };
  }

  function roleLabel(role){ return role==='OS'?'Outlet Supervisor':role==='FT'?'Full Timer':role==='CS'?'Cover Staff':'Part Timer'; }

  // ---------- Generic helpers for read-only history (take an explicit roster snapshot) ----------
  function rowWeeklyFor(rosterArr, row, otMap, columns){
    const staff = rosterArr.find(s=>s.id===row.staffId);
    let gross=0, paid=0, cost=0;
    row.shifts.forEach((sh, di)=>{
      const col = columns ? columns[di] : null;
      const effStaff = col ? (getEffectiveStaffForDay(staff, col) || staff) : staff;
      const h=shiftHours(sh, effStaff);
      gross+=h.gross; paid+=h.paid;
      cost += h.paid * (effStaff ? effStaff.rate : 0);
    });
    const rate = staff?staff.rate:0;
    const otH = (otMap && row.staffId) ? (otMap[row.staffId]||0) : 0;
    const otC = otH * rate * 1.5;
    return { gross, paid, cost: cost + otC, otHours: otH, otCost: otC, staff };
  }
  function totalWeeklyCostFor(rosterArr, rows, otMap){
    let t=0; rows.forEach(r=>{ t+=rowWeeklyFor(rosterArr,r,otMap).cost; }); return t;
  }
  function shiftDisplayLabel(shift, staff){
    if(shift.type==='OFF') return '<span class="ro-off">OFF</span>';
    if(shift.type==='OFFDAYR') return '<span class="ro-offr">OFFDAY (R)</span>';
    if(shift.type==='AL') return '<span class="ro-al">ANNUAL LEAVE</span>';
    if(shift.type==='BL') return '<span class="ro-bl">BIRTHDAY LEAVE</span>';
    if(shift.type==='MC') return '<span class="ro-mc">MC</span>';
    const h = shiftHours(shift, staff);
    if(h.gross<=0) return `<span class="ro-off">${shift.type}</span>`;
    return `<b>${shift.type}</b><br>${h.label}<br>${h.paid.toFixed(1)}h`;
  }

  // track which month accordions are open (by "month" number as string key)
  let openMonths = {};
  let openImportSheets = {};

  function renderHistory(){
    const currentKey = weekKey(cal.month, cal.week);
    const keys = Object.keys(weekArchive).filter(k=>k!==currentKey);
    if(keys.length===0) return '';
    keys.sort((a,b)=>{
      const [am,aw]=a.split('-').map(Number), [bm,bw]=b.split('-').map(Number);
      return (bm*10+bw)-(am*10+aw);
    });

    // Group by month
    const byMonth = {};
    keys.forEach(key=>{
      const [m] = key.split('-').map(Number);
      if(!byMonth[m]) byMonth[m]=[];
      byMonth[m].push(key);
    });
    const months = Object.keys(byMonth).map(Number).sort((a,b)=>b-a);

    let html = `<div class="zs-section-title" style="margin-top:26px;">Schedule History</div>
      <p class="zs-note" style="margin-top:-6px;">Saved automatically every time you switch weeks. Tap a month to expand its weeks.</p>`;

    months.forEach(m=>{
      const monthKeys = byMonth[m];
      const isOpen = !!openMonths[m];

      // Month-level summary: total salary across all weeks, count of weeks
      let monthTotal = 0;
      monthKeys.forEach(key=>{
        const data = weekArchive[key];
        const rRoster = data.rosterSnapshot || roster;
        monthTotal += totalWeeklyCostFor(rRoster, data.scheduleRows, data.otHours);
      });
      const weekCount = monthKeys.length;

      html += `<div class="zs-month-group ${isOpen?'open':''}" data-month="${m}">
        <div class="zs-month-header" data-toggle-month="${m}">
          <div class="zs-month-header-left">
            <span class="zs-month-chevron">›</span>
            <span class="zs-month-title">${MONTH_NAMES[m-1]} ${YEAR}</span>
            <span class="zs-month-badge">${weekCount} week${weekCount>1?'s':''} saved</span>
          </div>
          <div class="zs-month-summary">
            <span class="zs-month-cost">RM ${fmt(monthTotal)} total</span>
          </div>
        </div>
        <div class="zs-month-body">`;

      monthKeys.forEach(key=>{
        const [,w] = key.split('-').map(Number);
        const data = weekArchive[key];
        const rRoster = data.rosterSnapshot || roster;
        const rRows = data.scheduleRows;
        const cols = getColumnsFor(m,w);
        const validCols = cols.filter(c=>c.valid);
        const rangeLabel = (() => {
          if(!validCols.length) return '';
          const first = validCols[0], last = validCols[validCols.length-1];
          if(first.month === last.month){
            return `${ordinal(first.dateNum)} to ${ordinal(last.dateNum)} ${MONTH_NAMES[first.month-1]}`;
          }
          return `${ordinal(first.dateNum)} ${MONTH_NAMES[first.month-1]} to ${ordinal(last.dateNum)} ${MONTH_NAMES[last.month-1]}`;
        })();
        const total = totalWeeklyCostFor(rRoster, rRows, data.otHours);
        const savedLabel = data.savedAt ? new Date(data.savedAt).toLocaleString() : '';

        html += `<div class="zs-week-card">
          <div class="zs-week-card-head">
            <span>Week ${w} &nbsp;·&nbsp; ${rangeLabel}, ${YEAR}</span>
            <span class="wk-right">
              RM ${fmt(total)}
              <span style="font-weight:400;font-size:10px;color:var(--ink-soft);">saved ${savedLabel}</span>
              <button class="zs-mini-btn danger" data-delete-week="${key}">Delete</button>
            </span>
          </div>
          <div class="zs-table-wrap"><table class="zs-table zs-readonly">
            <colgroup>
              <col style="width:150px;">
              <col><col><col><col><col><col><col>
              <col style="width:110px;">
              <col style="width:55px;">
            </colgroup>
            <thead><tr class="zs-days"><th class="zs-name-col">Staff</th>${cols.map((c,ci)=>c.valid?`<th${c.inSelectedMonth===false?' style="opacity:0.55;"':''}>${c.weekday} ${ordinal(c.dateNum)}${c.inSelectedMonth===false?` <span style="font-size:8px;">(${MONTH_NAMES[c.month-1].slice(0,3)})</span>`:''}${c.holiday?`<span class="ph-tag">${c.holiday}</span>`:''}${c.weeklyNote?`<span class="zus-day-tag">${c.weeklyNote}</span>`:''}${c.opNotes&&c.opNotes.length?c.opNotes.map(n=>`<span class="op-tag">${n}</span>`).join(''):''}</th>`:`<th>—</th>`).join('')}<th>Weekly</th><th class="zs-ot-col">OT</th></tr>
            <tr class="zs-notes-row"><th class="zs-name-col" style="text-align:left;">Notes</th>${cols.map((c,ci)=>c.valid?`<th>${(data.customDayNotes&&data.customDayNotes[ci])?`<span class="note-readonly">${data.customDayNotes[ci]}</span>`:''}</th>`:`<th></th>`).join('')}<th></th><th class="zs-ot-col"></th></tr>
            </thead>
            <tbody>`;
        [...rRows].sort((a,b)=>{
          const ra=(rRoster.find(s=>s.id===a.staffId)||{}).role||'NONE';
          const rb=(rRoster.find(s=>s.id===b.staffId)||{}).role||'NONE';
          return ROLE_ORDER[ra]-ROLE_ORDER[rb];
        }).forEach(row=>{
          const staff = rRoster.find(s=>s.id===row.staffId);
          const w2 = rowWeeklyFor(rRoster, row, data.otHours, cols);
          html += `<tr><td class="zs-name-col">${staff?staff.name:'(unassigned)'}<span class="role-tag">${staff?roleLabel(staff.role):''}</span></td>`;
          cols.forEach((c,di)=>{
            if(!c.valid){ html += `<td>—</td>`; return; }
            html += `<td class="zs-readonly-cell">${shiftDisplayLabel(row.shifts[di], staff)}</td>`;
          });
          html += `<td class="zs-row-total">${w2.paid.toFixed(1)}h<br>RM ${fmt(w2.cost)}</td>`;
          html += `<td class="zs-ot-col">${w2.otHours>0?`<span class="zs-ot-badge">${otLabel(w2.otHours)}</span><span class="zs-ot-cost">RM ${fmt(w2.otCost)}</span>`:`<span class="zs-ot-badge zero">0</span>`}</td>`;
          html += `</tr>`;
        });
        html += `</tbody></table></div></div>`;
      });

      html += `</div></div>`;
    });
    return html;
  }

  function otLabel(h){
    if(h<=0) return '0';
    if(h===1) return '1H';
    return h.toFixed(1).replace(/\.0$/,'') + 'H';
  }

  function render(){
    try {
      renderInner();
    } catch(err){
      root.innerHTML = `<div style="padding:24px;font-family:monospace;background:#fbe9e9;color:#c23b3b;border-radius:10px;white-space:pre-wrap;">
        <b>Something broke while rendering the schedule.</b>
        This is a bug — please copy this message back to me so I can fix it:
        ${err && err.message ? err.message : err}
        ${err && err.stack ? '\n\n' + err.stack : ''}
      </div>`;
      console.error(err);
    }
  }

  function renderInner(){
    const columns = getColumns();
    const totalCost = totalWeeklyCost();
    const cap = targets.weeklyCap;
    const overHardCap = totalCost > 3000;
    const overWorkingCap = totalCost > cap && !overHardCap;
    let barColor = 'var(--green)';
    if(overHardCap) barColor = 'var(--red)'; else if(overWorkingCap) barColor = 'var(--amber)';
    const pct = cap>0 ? (totalCost/cap*100) : 0;

    const monthlyProjected = totalCost * 4.345;
    const sales = weeklyActualSales();
    const salesEntered = anyDailySalesEntered();
    const labourPct = (salesEntered && sales>0) ? (totalCost/sales*100) : null;
    let labourPill = '<span class="zs-pill pill-amber">Enter daily sales below</span>';
    if(labourPct!==null){
      if(labourPct<=15) labourPill = `<span class="zs-pill pill-green">${labourPct.toFixed(1)}% of sales</span>`;
      else if(labourPct<=20) labourPill = `<span class="zs-pill pill-amber">${labourPct.toFixed(1)}% of sales</span>`;
      else labourPill = `<span class="zs-pill pill-red">${labourPct.toFixed(1)}% of sales</span>`;
    }

    const { violations, notices } = validate(columns);
    const validCols = columns.filter(c=>c.valid);
    const rangeLabel = (() => {
      if(!validCols.length) return '';
      const first = validCols[0], last = validCols[validCols.length-1];
      if(first.month === last.month){
        return `${MONTH_NAMES[first.month-1]} ${ordinal(first.dateNum)} to ${ordinal(last.dateNum)}, ${YEAR}`;
      }
      return `${MONTH_NAMES[first.month-1]} ${ordinal(first.dateNum)} to ${MONTH_NAMES[last.month-1]} ${ordinal(last.dateNum)}, ${YEAR}`;
    })();

    let html = `
      <div class="zs-header">
        <div class="zs-header-top">
          <select class="eyebrow-select" id="zs-state-select">${STATE_LIST.map(s=>`<option value="${s.code}" ${selectedState===s.code?'selected':''}>${s.label}</option>`).join('')}</select>
          <span class="eyebrow-sep">›</span>
          <select class="eyebrow-select" id="zs-outlet-select">${(OUTLET_DATA[selectedState]||[]).map(o=>`<option value="${o}" ${selectedOutlet===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
        <h1>Roster, Schedule &amp; Salary Budget Optimizer</h1>
        <p>Manage who's on the team in the Staff Roster, then build the weekly schedule by picking names from that list. Pay, hours, public holidays and budget checks update automatically.</p>
      </div>
      <div class="zs-tabs">
        <div class="zs-tab ${activeTab==='roster'?'active':''}" data-tab="roster">Staff Roster</div>
        <div class="zs-tab ${activeTab==='schedule'?'active':''}" data-tab="schedule">Weekly Schedule</div>
      </div>
      <div class="zs-cal-controls">
        <span><label>Month</label><select id="zs-cal-month">${MONTH_NAMES.map((m,i)=>`<option value="${i+1}" ${cal.month===i+1?'selected':''}>${m}</option>`).join('')}</select></span>
        <span><label>Week</label><select id="zs-cal-week">${Array.from({length:weeksInMonth(cal.month)},(_,i)=>i+1).map(w=>`<option value="${w}" ${cal.week===w?'selected':''}>Week ${w}</option>`).join('')}</select></span>
        <span class="zs-cal-range">${rangeLabel}</span>
      </div>
      <div class="zs-kpis">
        <div class="zs-kpi">
          <div class="zs-kpi-row"><span class="mini">Weekly</span></div>
          <input type="number" id="zs-sales-target-w" value="${targets.weeklySalesTarget}" />
          <div class="label" style="margin-top:6px;">Monthly</div>
          <input type="number" id="zs-sales-target-m" value="${targets.monthlySalesTarget}" />
          <div class="sub">Sales targets</div>
        </div>
        <div class="zs-kpi">
          <div class="zs-kpi-row"><span class="mini">Weekly</span></div>
          <input type="number" id="zs-cap-w" value="${targets.weeklyCap}" />
          <div class="label" style="margin-top:6px;">Monthly</div>
          <input type="number" id="zs-cap-m" value="${targets.monthlyCap}" />
          <div class="sub">Budget caps (hard max RM3,000/wk)</div>
        </div>
        <div class="zs-kpi">
          <div class="label">Weekly Sales (auto-summed from daily entries)</div>
          <div class="value">RM ${fmt(weeklyActualSales())}</div>
          <div class="sub">${labourPill}</div>
        </div>
      </div>
      <div class="zs-kpis" style="grid-template-columns:repeat(2,1fr);">
        <div class="zs-kpi">
          <div class="label">Weekly Salary Cost (paid hours + OT)</div>
          <div class="value" style="color:${overHardCap?'var(--red)':overWorkingCap?'var(--amber)':'var(--green)'}">RM ${fmt(totalCost)}</div>
          <div class="sub">${pct.toFixed(1)}% of weekly cap ${totalOtCost()>0?`&middot; incl. RM ${fmt(totalOtCost())} OT`:''}</div>
          <div class="zs-budget-bar" style="margin-top:6px;"><div class="zs-budget-fill" style="width:${Math.min(pct,150)}%; background:${barColor};"></div></div>
        </div>
        <div class="zs-kpi">
          <div class="label">Monthly Projected Salary (&times;4.345 weeks)</div>
          <div class="value" style="color:${monthlyProjected>targets.monthlyCap?'var(--red)':'var(--ink)'}">RM ${fmt(monthlyProjected)}</div>
          <div class="sub">vs monthly cap RM ${fmt(targets.monthlyCap)}</div>
        </div>
      </div>
      <div class="zs-kpis" style="grid-template-columns:repeat(7,1fr);">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>`
        <div class="zs-kpi" style="padding:8px 10px;">
          <div class="label" style="font-size:9px;">${d} Daily Sales</div>
          <input type="number" id="zs-daily-${i}" placeholder="0" value="${dailySales[i]!==null&&dailySales[i]!==undefined?dailySales[i]:''}" style="font-size:12px;"/>
        </div>`).join('')}
      </div>
      <div class="zs-body">
    `;

    if(importConflicts){
      html += renderImportConflicts();
    } else if(weekBlockChoice){
      html += renderWeekBlockChoice();
    } else if(weekImportReview){
      html += renderWeekImportReview();
    } else if(activeTab==='roster'){
      html += renderRoster();
    } else {
      html += renderSchedule(columns, violations, notices, totalCost);
    }

    html += `</div>`;
    html += `<div class="zs-footer-credit"><b>Intellectual Property of Amani Nabihan (ZUS22286)</b> &bull; Powered by Claude</div>`;
    root.innerHTML = html;
    attachListeners();
  }

  function renderImportConflicts(){
    const { list, autoImported, importRoster } = importConflicts;
    let html = `
      <div class="zs-section-title">Import Review \u2014 Straits City Excel Data</div>
      <p class="zs-note" style="margin-top:-6px;">
        ${autoImported.length} week(s) imported automatically with no conflicts.
        ${list.length} week(s) already have data saved in this app \u2014 pick which version to keep for each.
      </p>
    `;
    list.forEach(({ key, wk, incomingRows, weekSnapshot, existingSnapshot }) => {
      const cols = getColumnsFor(wk.month, wk.week);
      const existingRoster = existingSnapshot.rosterSnapshot || roster;
      const existingCost = totalWeeklyCostFor(existingRoster, existingSnapshot.scheduleRows);
      const incomingCost = totalWeeklyCostFor(weekSnapshot, incomingRows);
      const renderMiniTable = (rows, rosterForRows) => {
        let t = `<table class="zs-table zs-readonly" style="min-width:0;"><thead><tr class="zs-days"><th class="zs-name-col">Staff</th>${cols.map(c=>c.valid?`<th>${c.weekday} ${ordinal(c.dateNum)}</th>`:`<th>\u2014</th>`).join('')}</tr></thead><tbody>`;
        rows.forEach(row=>{
          const staff = rosterForRows.find(s=>s.id===row.staffId);
          t += `<tr><td class="zs-name-col">${staff?staff.name:'(unassigned)'}</td>`;
          cols.forEach((c,di)=>{
            if(!c.valid){ t += `<td>\u2014</td>`; return; }
            t += `<td class="zs-readonly-cell">${shiftDisplayLabel(row.shifts[di], staff)}</td>`;
          });
          t += `</tr>`;
        });
        t += `</tbody></table>`;
        return t;
      };
      html += `<div class="zs-card" style="margin-bottom:18px;">
        <h3>${wk.label} <span style="font-weight:400;color:var(--ink-soft);">(${MONTH_NAMES[wk.month-1]}, Week ${wk.week})</span></h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px;">
          <div>
            <div style="font-weight:700; font-size:12px; color:var(--navy); margin-bottom:6px;">Currently in app &middot; RM ${fmt(existingCost)}</div>
            <div class="zs-table-wrap">${renderMiniTable(existingSnapshot.scheduleRows, existingRoster)}</div>
            <button class="zs-mini-btn ghost" style="margin-top:8px;" data-keep-existing="${key}">Keep this version</button>
          </div>
          <div>
            <div style="font-weight:700; font-size:12px; color:var(--green); margin-bottom:6px;">From Excel file &middot; RM ${fmt(incomingCost)}</div>
            <div class="zs-table-wrap">${renderMiniTable(incomingRows, weekSnapshot)}</div>
            <button class="zs-mini-btn" style="margin-top:8px;background:var(--green);" data-use-imported="${key}">Use this version instead</button>
          </div>
        </div>
      </div>`;
    });
    return html;
  }

  function renderWeekBlockChoice(){
    const { blocks } = weekBlockChoice;
    // Group by sheet name so different outlets/tabs in the same file don't all dump into
    // one long flat list — same fold/unfold pattern as Schedule History below.
    const bySheet = {};
    blocks.forEach((b, idx) => {
      const key = b.sheetName || '(unnamed sheet)';
      if(!bySheet[key]) bySheet[key] = [];
      bySheet[key].push({ ...b, idx });
    });
    const sheetNames = Object.keys(bySheet);
    let html = `
      <div class="zs-section-title">Choose Which Week To Import</div>
      <p class="zs-note" style="margin-top:-6px;">This file has ${blocks.length} week block(s) across ${sheetNames.length} sheet(s) \u2014 tap a sheet to expand it, then pick the week you want. Only one week can be imported at a time.</p>
    `;
    sheetNames.forEach(sheetName => {
      const sheetBlocks = bySheet[sheetName];
      const isOpen = !!openImportSheets[sheetName];
      html += `<div class="zs-month-group ${isOpen?'open':''}" data-sheet="${sheetName}">
        <div class="zs-month-header" data-toggle-sheet="${sheetName}">
          <div class="zs-month-header-left">
            <span class="zs-month-chevron">\u203a</span>
            <span class="zs-month-title">${sheetName}</span>
            <span class="zs-month-badge">${sheetBlocks.length} week${sheetBlocks.length>1?'s':''}</span>
          </div>
        </div>
        <div class="zs-month-body">
          <table class="zs-roster" style="min-width:0;">
            <thead><tr><th>Week</th><th>Dates</th><th>Staff Found</th><th></th></tr></thead>
            <tbody>
              ${sheetBlocks.map(b => `
                <tr>
                  <td style="font-weight:700;">${b.titleLabel || '\u2014'}</td>
                  <td>${b.dateLabel || b.weekLabel || 'Unknown'}</td>
                  <td>${b.rows.length}</td>
                  <td><button class="zs-mini-btn" data-choose-block="${b.idx}" style="background:var(--green);">Use this week</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    });
    html += `
      <div class="zs-actions-row" style="margin-top:14px;">
        <button class="zs-mini-btn ghost" id="zs-week-block-cancel">Cancel</button>
      </div>
    `;
    return html;
  }
  function renderWeekImportReview(){
    const { parsedRows, weekLabel, dateLabel, titleLabel, resolutions, forceShowAll } = weekImportReview;
    const toolCols = getColumns().filter(c=>c.valid);
    const toolWeekLabel = toolCols.map(c=>c.weekday.toUpperCase()+' '+c.dateNum).join(', ');
    const detectedLabel = dateLabel || weekLabel || 'Not detected';
    const dateMismatch = dateLabel && toolWeekLabel && !toolCols.every((c,i)=> dateLabel.includes(' '+c.dateNum) );

    // Build readable day-column headers (e.g. "Mon 13th") from whatever was detected in the file.
    const dayTokens = (dateLabel || weekLabel || '').split(',').map(t=>t.trim()).filter(Boolean);
    const dayHeaders = dayTokens.length === 7 ? dayTokens.map(t=>{
      const m = t.match(/^([A-Za-z]+)\s*(\d+)?$/);
      if(m){
        const wd = m[1][0].toUpperCase() + m[1].slice(1,3).toLowerCase();
        return m[2] ? `${wd} ${ordinal(parseInt(m[2],10))}` : wd;
      }
      return t;
    }) : ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    function resolvedStaff(idx){
      const val = resolutions[idx];
      if(val === 'SKIP' || val === 'NEW') return null;
      return roster.find(s=>s.id===val) || null;
    }
    function cellToShiftObj(cell){
      return { type: cell.code, midStart:600, csHH:cell.csHH||'', csMM:cell.csMM||'', ceHH:cell.ceHH||'', ceMM:cell.ceMM||'', coverDirection:'out', coverNote:'' };
    }
    const OFF_LIKE_LABELS = { OFF:'OFF', OFFDAYR:'OFFDAY (R)', AL:'ANNUAL LEAVE', BL:'BIRTHDAY LEAVE', MC:'MC' };

    let html = `
      <div class="zs-section-title">Import Preview \u2014 Tally Before You Proceed</div>
      <div class="zs-table-wrap" style="padding:14px 16px; margin-bottom:14px;">
        ${titleLabel ? `<p class="zs-note" style="margin:0 0 6px;"><b>Week label found in file:</b> ${titleLabel}</p>` : ''}
        <p class="zs-note" style="margin:0 0 6px;"><b>Dates detected in file:</b> ${detectedLabel}</p>
        <p class="zs-note" style="margin:0;"><b>Currently open in this tool:</b> ${toolWeekLabel} (${MONTH_NAMES[cal.month-1]}, Week ${cal.week}) \u2014 importing will fill in <u>this</u> week. If the dates above don't match, cancel, switch to the correct Month/Week using the controls above, then import again.</p>
        ${dateMismatch ? `<p style="color:var(--red); font-weight:700; font-size:12px; margin:8px 0 0;">\u26a0 The dates detected in the file don't look like they match the week you have open \u2014 double-check before applying.</p>` : ''}
      </div>
      <div class="zs-table-wrap">
      <table class="zs-table">
        <colgroup>
          <col style="width:190px;">
          <col><col><col><col><col><col><col>
        </colgroup>
        <thead>
          <tr><th colspan="8" style="background:var(--navy); color:#fff; text-align:center; font-size:13px; letter-spacing:0.03em;">${titleLabel ? `FROM FILE: ${titleLabel.toUpperCase()} \u2014 ` : ''}IMPORTING INTO: ${MONTH_NAMES[cal.month-1].toUpperCase()} ${YEAR}, WEEK ${cal.week}</th></tr>
          <tr class="zs-days"><th class="zs-name-col">Name in File</th>${dayHeaders.map(d=>`<th>${d}</th>`).join('')}</tr>
        </thead>
        <tbody>
          ${parsedRows.map((pr, idx) => {
            const staff = resolvedStaff(idx);
            const matchedStaff = (pr.autoMatchedStaffId && !forceShowAll.includes(idx)) ? roster.find(s=>s.id===pr.autoMatchedStaffId) : null;
            const nameCell = `
              <div style="font-weight:700;">${pr.rawName}</div>
              <select class="week-import-resolve" data-idx="${idx}" style="margin-top:6px; width:100%; font-size:11px;">
                <option value="SKIP" ${resolutions[idx]==='SKIP'?'selected':''}>Skip This Row</option>
                <option value="NEW" ${resolutions[idx]==='NEW'?'selected':''}>Add as New Staff</option>
                ${matchedStaff
                  ? `<option value="${matchedStaff.id}" ${resolutions[idx]===matchedStaff.id?'selected':''}>${matchedStaff.name} (${matchedStaff.role})</option>`
                  : roster.map(s=>`<option value="${s.id}" ${resolutions[idx]===s.id?'selected':''}>${s.name} (${s.role})</option>`).join('')
                }
              </select>
              ${matchedStaff ? `<div class="zs-note" style="margin-top:4px; font-size:10px;">Matched automatically. <a href="#" class="week-import-show-all" data-idx="${idx}" style="color:var(--navy);">Not them? Pick a different staff member</a></div>` : ''}
              ${resolutions[idx]==='NEW' ? (
                pr.detectedRole
                  ? `<div class="zs-note" style="margin-top:4px; font-size:10.5px;">Role from file: <b>${roleLabel(pr.detectedRole)}</b></div>`
                  : `<select class="week-import-role" data-idx="${idx}" style="margin-top:4px; width:100%; font-size:11px;">
                      <option value="OS">Outlet Supervisor</option>
                      <option value="FT">Full Timer</option>
                      <option value="CS">Cover Staff</option>
                      <option value="PT" selected>Part Timer</option>
                    </select>
                    <div class="zs-note" style="margin-top:2px; font-size:10px; color:var(--amber);">Role not detected \u2014 please confirm</div>`
              ) : ''}
            `;
            const cellsHtml = pr.shifts.map(cell => {
              if(OFF_LIKE_LABELS[cell.code]){
                return `<td><div class="zs-cell off" style="text-align:center;">${OFF_LIKE_LABELS[cell.code]}</div></td>`;
              }
              const h = shiftHours(cellToShiftObj(cell), staff);
              return `<td><div class="zs-cell" style="text-align:center;">
                <div style="font-weight:700;">${cell.code}${cell.unrecognized?' *':''}</div>
                ${h.label ? `<div class="time-label">${h.label}</div>` : ''}
                ${h.gross>0 ? `<div class="hr-badges"><span class="hr-badge">${h.gross.toFixed(1)}h</span></div>` : ''}
              </div></td>`;
            }).join('');
            return `<tr class="zs-data-row"><td class="zs-name-col">${nameCell}</td>${cellsHtml}</tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
      <p class="zs-note" style="margin-top:8px;">* means the file used text this tool didn't recognize as a shift code or time range, and it was set to OFF \u2014 worth checking that row after importing. Hours shown assume the role picked in the dropdown; picking a different role or "Skip"/"Add as new" may change actual paid hours after import.</p>
    `;
    html += `<div class="zs-actions-row" style="margin-top:14px;">
      <button class="zs-mini-btn ghost" id="zs-week-import-add-all-new">Add Unassigned Names to Staff Roster</button>
      <button class="zs-mini-btn" id="zs-week-import-apply" style="background:var(--green);">Apply Import</button>
      <button class="zs-mini-btn ghost" id="zs-week-import-cancel">Cancel</button>
    </div>`;
    return html;
  }

  function renderRoster(){
    let html = `
      <div class="zs-section-title">Staff Roster</div>
      <p class="zs-note" style="margin-top:-6px;">Add new hires here, mark someone inactive when they resign, or change their role to reflect a promotion/demotion &mdash; the schedule tab picks names straight from this list and recalculates pay automatically.</p>
      <div class="zs-roster-wrap">
      <table class="zs-roster">
        <thead><tr>
          <th style="min-width:120px;">Name</th>
          <th>Role</th>
          <th>CS Position</th>
          <th>Status</th>
          <th>Std. Hours/Day</th>
          <th>Rate (RM/hr)</th>
          <th style="min-width:140px;">Notes</th>
          <th></th>
        </tr></thead>
        <tbody>
    `;

  function hhSelect(selected, rowId, day, field){

      opts+=`<option value="${v}" ${selected===v?'selected':''}>${h12} ${ampm}</option>`;
    }
    return `<select class="tp-hh" data-row="${rowId}" data-day="${day}" data-field="${field}">${opts}</select>`;
  }
